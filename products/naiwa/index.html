<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080704" />
    <meta
      name="description"
      content="欢迎来到《奶蛙交换计划》：亲手揭晓两位交换一天的嘉宾。"
    />
    <title>奶蛙交换计划：嘉宾揭晓</title>
    <link rel="icon" href="./assets/naiwa-icon.png" type="image/png" />
    <link rel="stylesheet" href="./src/life-swap/intro.css" />
  </head>
  <body>
    <main class="intro-shell" data-active-screen="welcome">
      <section class="intro-screen intro-screen--show" data-screen="show" aria-labelledby="show-title" data-show-phase="welcome" aria-busy="true">
        <div class="intro-show-stage" aria-describedby="show-premise intro-live">
          <header class="intro-show-copy">
            <p class="intro-show-kicker">人生交换实验 · 嘉宾揭晓</p>
            <h1 id="show-title" data-show-title data-screen-focus data-intro-copy="title"></h1>
            <p id="show-premise" data-intro-copy="premise"></p>
          </header>

          <div class="intro-guest-grid" aria-label="本期两位交换嘉宾" data-reveal-visual>
            <article class="intro-guest-card intro-guest-card--human" data-guest-card data-guest="human">
              <figure class="intro-reveal-visual" data-guest-visual aria-hidden="true">
                <img
                  src="./assets/life-swap/intro/guest-reveal.png"
                  data-opening-image
                  alt="暖暗的节目舞台上，一把空折叠椅正等待人类嘉宾入座。"
                />
              </figure>
              <div class="intro-guest-card__stage" aria-hidden="true">
                <span class="intro-seat-number">01</span>
                <span class="intro-human-shadow"></span>
              </div>
              <div class="intro-guest-card__cover" aria-hidden="true">
                <span>?</span>
                <small>交换嘉宾</small>
              </div>
              <div class="intro-guest-card__reveal" data-guest-reveal aria-hidden="true">
                <p class="intro-guest-card__role">人类嘉宾</p>
                <h2 data-intro-copy="humanName"></h2>
                <p data-intro-copy="humanStatus"></p>
              </div>
            </article>

            <article class="intro-guest-card intro-guest-card--naiwa" data-guest-card data-guest="naiwa">
              <figure class="intro-reveal-visual" data-guest-visual aria-hidden="true">
                <img
                  src="./assets/life-swap/intro/guest-reveal.png"
                  data-opening-image
                  alt="奶蛙一本正经地坐在过小的黑色折叠椅上，领带略歪，手里的节目手卡拿反。"
                />
              </figure>
              <div class="intro-guest-card__cover" aria-hidden="true">
                <span>?</span>
                <small>交换嘉宾</small>
              </div>
              <div class="intro-guest-card__reveal" data-guest-reveal aria-hidden="true">
                <p class="intro-guest-card__role">非人类嘉宾</p>
                <h2 data-intro-copy="naiwaName"></h2>
                <p data-intro-copy="naiwaStatus"></p>
              </div>
            </article>
          </div>

          <button class="intro-skip" type="button" data-action="skip"><span data-intro-copy="skipAction"></span></button>

          <div class="intro-show-action">
            <p class="intro-punchline" data-punchline data-intro-copy="punchline" hidden></p>
            <p class="intro-action-cue" data-opening-cue aria-hidden="true"></p>
            <button class="intro-primary" type="button" data-action="reveal" disabled>
              <span data-intro-copy="revealAction"></span><span aria-hidden="true">→</span>
            </button>
            <button class="intro-primary" type="button" data-action="enter" hidden>
              <span data-intro-copy="enterAction"></span><span aria-hidden="true">→</span>
            </button>
          </div>
        </div>
      </section>

      <section class="intro-screen intro-screen--choosing" data-screen="choosing" data-active-preview="work" aria-labelledby="choosing-title" hidden>
        <header class="intro-flashback-heading">
          <p>节目组调出四段回放</p>
          <h2 id="choosing-title" data-screen-focus>哪一幕，最近刚发生过？</h2>
        </header>
        <div class="intro-flashback-strip" aria-label="选择一段最近发生过的生活片段">
          <button class="intro-flashback" type="button" data-route="work">
            <img data-flashback-image alt="" />
            <span class="intro-flashback__shade" aria-hidden="true"></span>
            <span class="intro-flashback__copy">
              <span class="intro-flashback__time" data-route-time></span>
              <span class="intro-flashback__line" data-route-line></span>
              <span class="intro-flashback__note" data-route-note></span>
              <span class="intro-flashback__action" aria-hidden="true">交给奶蛙 <b>→</b></span>
            </span>
          </button>
          <button class="intro-flashback" type="button" data-route="message">
            <img data-flashback-image alt="" />
            <span class="intro-flashback__shade" aria-hidden="true"></span>
            <span class="intro-flashback__copy">
              <span class="intro-flashback__time" data-route-time></span>
              <span class="intro-flashback__line" data-route-line></span>
              <span class="intro-flashback__note" data-route-note></span>
              <span class="intro-flashback__action" aria-hidden="true">交给奶蛙 <b>→</b></span>
            </span>
          </button>
          <button class="intro-flashback" type="button" data-route="spotlight">
            <img data-flashback-image alt="" />
            <span class="intro-flashback__shade" aria-hidden="true"></span>
            <span class="intro-flashback__copy">
              <span class="intro-flashback__time" data-route-time></span>
              <span class="intro-flashback__line" data-route-line></span>
              <span class="intro-flashback__note" data-route-note></span>
              <span class="intro-flashback__action" aria-hidden="true">交给奶蛙 <b>→</b></span>
            </span>
          </button>
          <button class="intro-flashback" type="button" data-route="absurd">
            <img data-flashback-image alt="" />
            <span class="intro-flashback__shade" aria-hidden="true"></span>
            <span class="intro-flashback__copy">
              <span class="intro-flashback__time" data-route-time></span>
              <span class="intro-flashback__line" data-route-line></span>
              <span class="intro-flashback__note" data-route-note></span>
              <span class="intro-flashback__action" aria-hidden="true">交给奶蛙 <b>→</b></span>
            </span>
          </button>
        </div>
      </section>

      <section class="intro-screen intro-screen--route" data-screen="route" aria-labelledby="route-title" hidden>
        <figure class="intro-frame intro-frame--route">
          <img alt="" data-route-image />
        </figure>
        <div class="intro-vignette" aria-hidden="true"></div>
        <article class="intro-route-copy" aria-describedby="intro-live">
          <h2 id="route-title" data-screen-focus data-route-copy></h2>
          <button class="intro-backstage" type="button" data-action="backstage"><span aria-hidden="true">←</span><span>再看一幕</span></button>
        </article>
      </section>
    </main>
    <p id="intro-live" class="visually-hidden" aria-live="polite" aria-atomic="true" data-live-region></p>
    <script type="module" src="./src/life-swap/intro-app.js?v=20260720-family-dinner-v2"></script>
  </body>
</html>
