<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a241a" />
    <meta name="description" content="你和奶蛙交换一天人生。今天，它替你上班。" />
    <title>奶蛙交换计划</title>
    <link rel="icon" href="./assets/naiwa-icon.png" type="image/png" />
    <link rel="stylesheet" href="./src/life-swap/slice.css" />
  </head>
  <body>
    <main class="show-shell">
      <header class="show-bar">
        <a class="show-brand" href="./" aria-label="奶蛙交换计划，重新开始">
          <img src="./assets/naiwa-icon.png" alt="" width="38" height="38" />
          <span data-copy="show-name">奶蛙交换计划</span>
        </a>
      </header>

      <section class="screen home-screen" data-screen="home" aria-labelledby="home-title">
        <article class="home-panel">
          <h1 id="home-title" data-copy="home-title">别人养龙虾，你养奶蛙。</h1>
          <p class="home-intro" data-copy="home-intro">
            今天互换人生：它替你上班，你替它回老板。你的班味，先让它尝尝。
          </p>
          <button class="primary-action" type="button" data-action="start">
            <span>把班味喂给它</span><span aria-hidden="true">→</span>
          </button>
        </article>

        <figure class="hero-visual home-visual">
          <img
            src="./assets/life-swap/hero-office-v2.png"
            alt="奶蛙穿着不合身的深绿色西装坐在你的工位上，一手举着手机，一手拿着红色大印章。"
          />
        </figure>
      </section>

      <section class="screen question-screen" data-screen="question" aria-labelledby="question-title" hidden>
        <article class="question-panel">
          <p class="eyebrow" data-copy="question-eyebrow">周五 09:13 · 你的工位</p>
          <h1 id="question-title" data-copy="question">老板在群里说：周末大家自愿来一下。</h1>

          <div class="choice-stack" aria-label="选择奶蛙的行动">
            <button class="choice-row" type="button" data-choice="ignore">
              <span class="choice-key">A</span><span class="choice-label">装没看见</span><span class="choice-arrow" aria-hidden="true">→</span>
            </button>
            <button class="choice-row" type="button" data-choice="overtime">
              <span class="choice-key">B</span><span class="choice-label">问有没有加班费</span><span class="choice-arrow" aria-hidden="true">→</span>
            </button>
            <button class="choice-row" type="button" data-choice="later">
              <span class="choice-key">C</span><span class="choice-label">先答应，到时候再说</span><span class="choice-arrow" aria-hidden="true">→</span>
            </button>
            <button class="choice-row choice-row--naiwa" type="button" data-choice="weekend">
              <span class="choice-key">D</span><span class="choice-label">向周末本人请假</span><span class="choice-arrow" aria-hidden="true">↗</span>
            </button>
          </div>
        </article>

        <figure class="hero-visual question-visual">
          <img
            src="./assets/life-swap/hero-office-v2.png"
            alt="奶蛙穿着不合身的深绿色西装坐在你的工位上，一手举着手机，一手拿着红色大印章。"
          />
        </figure>
      </section>

      <section class="screen outcome-screen" data-screen="outcome" aria-labelledby="outcome-title" hidden>
        <figure class="outcome-visual">
          <img data-outcome-image src="./assets/naiwa-original.png" alt="" />
        </figure>

        <article class="outcome-panel">
          <p class="eyebrow" data-outcome-choice>选择结果</p>
          <h1 id="outcome-title" data-outcome-title>星期六批准了。</h1>
          <p class="outcome-punchline" data-outcome-punchline>奶蛙向周末本人递交了请假条。</p>
          <p class="outcome-consequence" data-outcome-consequence>星期六同意。老板暂时没找到可以反对的主体。</p>
          <p class="route-chip" data-outcome-route>人生偏移：超现实劳动仲裁员 +1</p>

          <button class="replay-action" type="button" data-action="replay">
            <span>再选一次</span><span aria-hidden="true">↩</span>
          </button>
        </article>
      </section>
    </main>

    <script type="module" src="./src/life-swap/app.js"></script>
  </body>
</html>
