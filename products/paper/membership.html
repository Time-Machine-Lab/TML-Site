<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成为会员 - 小纸的壁纸铺</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">小纸的<span>壁纸铺</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首页</a></li>
        <li><a href="category.html" class="nav-link">画廊</a></li>
        <li><a href="membership.html" class="nav-link active">会员</a></li>
      </ul>
      <div class="nav-actions">
        <a href="favorites.html" class="btn-icon" title="我的收藏">♡</a>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- 页面标题 -->
  <header class="page-header">
    <h1 class="page-title">成为小店会员</h1>
    <p class="page-subtitle">解锁更多精美壁纸</p>
  </header>

  <!-- 会员卡片 -->
  <main class="container">
    <div class="grid grid-3 membership-grid">
      <!-- 访客 -->
      <div class="membership-card">
        <h3 class="membership-name">访客</h3>
        <div class="membership-price">免费</div>
        <ul class="membership-features">
          <li>浏览所有壁纸</li>
          <li>下载免费壁纸</li>
          <li>收藏喜欢的壁纸</li>
        </ul>
        <button class="btn btn-secondary">当前身份</button>
      </div>

      <!-- 常客 -->
      <div class="membership-card featured">
        <div class="membership-badge">推荐</div>
        <h3 class="membership-name">常客</h3>
        <div class="membership-price">¥19<span>/月</span></div>
        <ul class="membership-features">
          <li>所有访客权益</li>
          <li>下载全部壁纸</li>
          <li>优先获取新品</li>
          <li>专属壁纸故事</li>
        </ul>
        <button class="btn btn-primary">立即订阅</button>
      </div>

      <!-- 挚友 -->
      <div class="membership-card">
        <h3 class="membership-name">挚友</h3>
        <div class="membership-price">¥168<span>/年</span></div>
        <ul class="membership-features">
          <li>所有常客权益</li>
          <li>年度专属礼包</li>
          <li>定制壁纸服务</li>
          <li>店主手写感谢信</li>
        </ul>
        <button class="btn btn-primary">立即订阅</button>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">小纸的壁纸铺 · 用心挑选每一张壁纸</p>
    </div>
  </footer>
</body>
</html>
