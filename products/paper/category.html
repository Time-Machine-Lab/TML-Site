<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>壁纸画廊 - 小纸的壁纸铺</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">小纸的<span>壁纸铺</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首页</a></li>
        <li><a href="category.html" class="nav-link active">画廊</a></li>
        <li><a href="membership.html" class="nav-link">会员</a></li>
      </ul>
      <div class="nav-actions">
        <a href="favorites.html" class="btn-icon" title="我的收藏">♡</a>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- 页面标题 -->
  <header class="page-header">
    <h1 class="page-title">壁纸画廊</h1>
    <p class="page-subtitle">每一张都是精心挑选的小美好</p>
  </header>

  <!-- 筛选栏 -->
  <section class="container">
    <div class="filter-bar">
      <button class="filter-btn active" data-cat="all">全部</button>
      <button class="filter-btn" data-cat="floral">🌸 花卉</button>
      <button class="filter-btn" data-cat="landscape">🏔️ 风景</button>
      <button class="filter-btn" data-cat="healing">🌿 治愈</button>
      <button class="filter-btn" data-cat="minimal">○ 简约</button>
    </div>
  </section>

  <!-- 壁纸网格 -->
  <main class="container">
    <div class="grid grid-4" id="wallpaper-grid"></div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">小纸的壁纸铺 · 用心挑选每一张壁纸</p>
    </div>
  </footer>

  <script src="js/gallery.js"></script>
</body>
</html>
