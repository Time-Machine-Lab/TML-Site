<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小纸的壁纸铺 - 手绘风格壁纸小店</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">小纸的<span>壁纸铺</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link active">首页</a></li>
        <li><a href="category.html" class="nav-link">画廊</a></li>
        <li><a href="membership.html" class="nav-link">会员</a></li>
      </ul>
      <div class="nav-actions">
        <a href="favorites.html" class="btn-icon" title="我的收藏">♡</a>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <header class="hero">
    <div class="container">
      <div class="hero-content">
        <h1 class="hero-title">欢迎来到小纸的壁纸铺</h1>
        <p class="hero-subtitle">每一张壁纸，都是一个小小的故事</p>
        <a href="category.html" class="btn btn-primary">逛逛小店</a>
      </div>
    </div>
  </header>

  <!-- 店主寄语 -->
  <section class="section owner-message">
    <div class="container">
      <div class="letter-paper">
        <p class="handwriting">
          亲爱的朋友，你好呀~<br><br>
          欢迎来到我的小店！这里收集了我精心挑选的壁纸，<br>
          每一张都承载着独特的故事和情感。<br><br>
          希望你能在这里找到让心情变好的那一张~
        </p>
        <div class="signature">
          <span class="handwriting">—— 小纸</span>
          <span class="stamp">店主</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 分类入口 -->
  <section class="section categories">
    <div class="container">
      <h2 class="section-title">逛逛分类</h2>
      <div class="grid grid-4 category-grid">
        <a href="category.html?cat=floral" class="category-card">
          <span class="category-icon">🌸</span>
          <span class="category-name">花卉</span>
          <span class="category-desc">四季花开</span>
        </a>
        <a href="category.html?cat=landscape" class="category-card">
          <span class="category-icon">🏔️</span>
          <span class="category-name">风景</span>
          <span class="category-desc">山川湖海</span>
        </a>
        <a href="category.html?cat=healing" class="category-card">
          <span class="category-icon">🌿</span>
          <span class="category-name">治愈</span>
          <span class="category-desc">温柔色调</span>
        </a>
        <a href="category.html?cat=minimal" class="category-card">
          <span class="category-icon">○</span>
          <span class="category-name">简约</span>
          <span class="category-desc">少即是多</span>
        </a>
      </div>
    </div>
  </section>

  <!-- 本周精选 -->
  <section class="section featured">
    <div class="container">
      <h2 class="section-title">本周精选</h2>
      <div class="grid grid-4" id="featured-grid"></div>
      <div class="section-footer">
        <a href="category.html" class="btn btn-secondary">查看更多</a>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">小纸的壁纸铺 · 用心挑选每一张壁纸</p>
      <p class="footer-text">© 2024 All rights reserved</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
