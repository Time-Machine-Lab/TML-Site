<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HYPER-POP ARCADE | Digital Asset Dispenser</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================================================
           1. THEME: ELECTRIC CANDY PLASTIC
           ========================================================================= */
        :root {
            --c-bg-main: #0A001A;
            --c-plastic-blue: rgba(0, 240, 255, 0.8);
            --c-plastic-pink: rgba(255, 0, 170, 0.8);
            --c-plastic-yellow: rgba(255, 220, 0, 0.9);

            --c-neon-cyan: #00FFFF;
            --c-neon-magenta: #FF00FF;
            --c-neon-lime: #CCFF00;

            --glow-cyan: 0 0 30px var(--c-neon-cyan);
            --glow-pink: 0 0 30px var(--c-neon-magenta);

            --f-pixel: 'Press Start 2P', cursive;
            --f-ui: 'Space Grotesk', sans-serif;

            --header-h: 90px;
        }

        *, *::before, *::after {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; cursor: none;
        }

        body {
            background: var(--c-bg-main);
            color: #fff; font-family: var(--f-ui);
            overflow-x: hidden; width: 100vw; min-height: 100vh;
            /* The Arcade Cabinet Background Texture */
            background-image:
                    radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.15), transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(255, 0, 170, 0.15), transparent 40%),
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0z' fill='none'/%3E%3Cpath d='M0 0h2v60H0zM58 0h2v60h-2zM0 0h60v2H0zM0 58h60v2H0z' fill='rgba(255,255,255,0.05)'/%3E%3C/svg%3E");
        }

        /* Global Scanline Overlay for CRT Effect */
        .crt-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            mix-blend-mode: overlay;
        }

        /* =========================================================================
           2. UI COMPONENTS: CHUNKY & GLOWING
           ========================================================================= */
        /* The Physical Arcade Button */
        .arcade-btn {
            position: relative; height: 50px; padding: 0 30px;
            border: 4px solid #fff; border-radius: 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.1) 100%);
            color: #fff; font-family: var(--f-pixel); font-size: 12px; text-transform: uppercase;
            box-shadow: 0 8px 0 #000, 0 8px 20px var(--c-neon-cyan);
            text-shadow: 2px 2px 0 #000;
            transform: translateY(0); transition: all 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .arcade-btn::before {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; height: 40%;
            background: rgba(255,255,255,0.4); border-radius: 6px; pointer-events: none;
        }
        .arcade-btn:active, .arcade-btn.pressed {
            transform: translateY(8px); box-shadow: 0 0 0 #000, inset 0 5px 10px rgba(0,0,0,0.5);
            background: var(--c-neon-cyan); color: #000; text-shadow: none;
        }
        .arcade-btn.pink { border-color: var(--c-neon-magenta); box-shadow: 0 8px 0 #000, 0 8px 20px var(--c-neon-magenta); }
        .arcade-btn.pink:active { background: var(--c-neon-magenta); }

        /* =========================================================================
           3. HEADER: THE CONTROL DECK
           ========================================================================= */
        .header-deck {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-h);
            z-index: 500; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px;
            background: linear-gradient(180deg, rgba(10,0,26,0.9), rgba(10,0,26,0.7));
            border-bottom: 4px solid var(--c-neon-cyan);
            box-shadow: var(--glow-cyan);
            backdrop-filter: blur(10px);
        }

        .brand-box {
            display: flex; align-items: center; gap: 15px;
        }
        .brand-logo {
            font-family: var(--f-pixel); font-size: 20px; color: var(--c-neon-yellow);
            text-shadow: 4px 4px 0 var(--c-neon-magenta);
            transform: skewX(-10deg);
        }
        .coin-slot {
            font-family: var(--f-pixel); font-size: 10px; color: var(--c-neon-lime);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .controls-box { display: flex; gap: 20px; }

        /* =========================================================================
           4. HERO SECTION: THE PHYSICS GACHAPON MACHINE
           ========================================================================= */
        .hero-machine {
            height: 90vh; width: 100%; position: relative;
            padding-top: var(--header-h);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* The Physics Container Canvas */
        #physics-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: auto; /* Matter.js needs events */
        }

        /* Overlay Text behind physics */
        .hero-overlay-text {
            position: absolute; z-index: 5; text-align: center; pointer-events: none;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .hero-h1 {
            font-family: var(--f-ui); font-weight: 900; font-size: clamp(4rem, 10vw, 8rem);
            line-height: 0.9; color: transparent; -webkit-text-stroke: 4px var(--c-neon-cyan);
            text-shadow: 0 0 50px var(--c-neon-cyan); opacity: 0.5;
        }

        /* =========================================================================
           5. THE PRIZE CHUTE (Footer Area)
           ========================================================================= */
        .prize-chute-area {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
            z-index: 800; display: flex; justify-content: center; align-items: flex-end;
            pointer-events: none; /* Allow click through to page */
        }

        .prize-door {
            width: 300px; height: 100px; background: #222;
            border: 6px solid #444; border-bottom: none;
            border-radius: 20px 20px 0 0;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 -5px 20px rgba(0,240,255,0.3);
            position: relative; overflow: hidden; pointer-events: auto;
        }
        .prize-door::after {
            content: 'PRIZE CHUTE'; position: absolute; bottom: 10px; width: 100%;
            text-align: center; font-family: var(--f-pixel); font-size: 10px; color: #666;
        }
        .door-flap {
            position: absolute;top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #555, #333);
            transform-origin: top; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-bottom: 4px solid #111;
        }
        .prize-door:hover .door-flap, .prize-door.collecting .door-flap {
            transform: rotateX(70deg);
        }

        /* =========================================================================
           6. THE GALLERY STRIP (Below fold)
           ========================================================================= */
        .gallery-strip-section {
            position: relative; z-index: 20; padding: 100px 0;
            background: linear-gradient(180deg, transparent, var(--c-bg-main) 20%);
        }
        .strip-header {
            text-align: center; font-family: var(--f-pixel); color: var(--c-neon-magenta);
            margin-bottom: 40px; font-size: 14px;
        }

        .infinite-strip-container {
            width: 100%; overflow: hidden; padding: 20px 0;
            background: rgba(255,0,170,0.1); border-top: 4px solid var(--c-neon-magenta); border-bottom: 4px solid var(--c-neon-magenta);
        }
        .infinite-strip {
            display: flex; gap: 40px; width: max-content;
            animation: scrollLeft 30s linear infinite;
        }
        .strip-item {
            width: 200px; aspect-ratio: 3/4; border-radius: 12px;
            border: 4px solid var(--c-neon-cyan); background: #000;
            overflow: hidden; position: relative; flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transform: skewX(-5deg); transition: 0.3s;
        }
        .strip-item:hover { transform: skewX(0deg) scale(1.1); z-index: 10; box-shadow: var(--glow-cyan); }
        .strip-img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes scrollLeft { to { transform: translateX(-50%); } }

        /* =========================================================================
           7. CUSTOM CURSOR & MODAL
           ========================================================================= */
        #cursor {
            position: fixed; top: 0; left: 0; z-index: 10000; pointer-events: none;
        }
        .cursor-reticle {
            width: 40px; height: 40px; border: 3px dashed var(--c-neon-lime); border-radius: 50%;
            position: absolute; transform: translate(-50%, -50%); animation: spin 10s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        body.hover-interact .cursor-reticle { border-style: solid; border-color: var(--c-neon-cyan); background: rgba(0,240,255,0.2); }

        /* Modal (The Opened Prize) */
        #modal-layer {
            position: fixed; inset: 0; z-index: 9000; background: rgba(10,0,26,0.95);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #modal-layer.active { opacity: 1; pointer-events: auto; }

        .prize-card {
            width: 70vw; height: 80vh; background: #111;
            border: 4px solid var(--c-neon-cyan); border-radius: 20px;
            box-shadow: var(--glow-cyan), inset 0 0 50px rgba(0,240,255,0.3);
            display: grid; grid-template-columns: 2fr 1fr; overflow: hidden;
            transform: scale(0.8); transition: 0.5s var(--ease-elastic);
        }
        #modal-layer.active .prize-card { transform: scale(1); }

        .pc-img-box { position: relative; border-right: 4px solid var(--c-neon-cyan); }
        #pc-img { width: 100%; height: 100%; object-fit: cover; }

        .pc-data { padding: 40px; display: flex; flex-direction: column; }
        .pc-title { font-family: var(--f-ui); font-weight: 900; font-size: 3rem; color: var(--c-neon-yellow); }
        .pc-btn { margin-top: auto; width: 100%; }

    </style>
</head>
<body>

<div class="crt-overlay"></div>

<header class="header-deck">
    <div class="brand-box">
        <div class="brand-logo">HYPER-POP</div>
        <div class="coin-slot">INSERT COIN [99]</div>
    </div>
    <div class="controls-box">
        <button class="arcade-btn interact">FILTER</button>
        <button class="arcade-btn pink interact">MENU</button>
    </div>
</header>

<section class="hero-machine">
    <div class="hero-overlay-text">
        <h1 class="hero-h1">DROP<br>THE<br>BEAT</h1>
    </div>
    <canvas id="physics-canvas"></canvas>
</section>

<section class="gallery-strip-section">
    <div class="strip-header">/// BONUS ROUND: INFINITE SCROLL ///</div>
    <div class="infinite-strip-container">
        <div class="infinite-strip" id="infinite-strip">
        </div>
    </div>
</section>

<div class="prize-chute-area">
    <div class="prize-door interact" id="prize-door">
        <div class="door-flap"></div>
    </div>
</div>

<div id="modal-layer">
    <div class="prize-card">
        <div class="pc-img-box">
            <img src="" id="pc-img">
        </div>
        <div class="pc-data">
            <h2 class="pc-title" id="pc-title">ASSET NAME</h2>
            <div style="font-family:var(--f-pixel); color:var(--c-neon-magenta); margin-top:20px;">ULTRA RARE DROP!</div>
            <button class="arcade-btn pink interact pc-btn" id="pc-dl">DOWNLOAD TOKENS</button>
            <button class="arcade-btn interact pc-btn" style="margin-top:20px;" id="pc-close">CLOSE</button>
        </div>
    </div>
</div>

<div id="cursor">
    <div class="cursor-reticle"></div>
</div>


<script>
    /**
     * HYPER-POP ENGINE v1.0
     * Integrates Matter.js physics, GSAP animation, and Web Audio.
     */

    const RESOURCES = [
        { title: 'NEON_TOKYO', url: 'https://images.unsplash.com/photo-1542931287-023b922fa89b?q=80&w=500' },
        { title: 'FLUID_FLUX', url: 'https://images.unsplash.com/photo-1618172193622-ae2d025f4032?q=80&w=500' },
        { title: 'CYBER_KAT', url: 'https://images.unsplash.com/photo-1563089145-599997674d42?q=80&w=500' },
        { title: 'HOLO_FOIL', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=500' },
        { title: 'SPACE_VOID', url: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=500' },
        { title: 'HARDWARE', url: 'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=500' },
        { title: 'OIL_SLICK', url: 'https://images.unsplash.com/photo-1515462277126-2dd0c162007a?q=80&w=500' },
        { title: 'NIGHT_RUN', url: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=500' }
    ];

    // --- 1. AUDIO SYNTH (Arcade Sounds) ---
    class ArcadeAudio {
        constructor() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.2;
            this.master.connect(this.ctx.destination);
            this.init = false;
        }
        enable() { if(!this.init) { this.ctx.resume(); this.init = true; } }

        // Sound: Crisp selection blip
        playBlip() {
            if(!this.init) return;
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
            osc.connect(g); g.connect(this.master);
            osc.start(); osc.stop(this.ctx.currentTime + 0.05);
        }
        // Sound: Heavy clunk (prize drop)
        playClunk() {
            if(!this.init) return;
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.2);
            g.gain.setValueAtTime(0.3, this.ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
            osc.connect(g); g.connect(this.master);
            osc.start(); osc.stop(this.ctx.currentTime + 0.2);
        }
        // Sound: Success chime
        playWin() {
            if(!this.init) return;
            const now = this.ctx.currentTime;
            [440, 554, 659, 880].forEach((freq, i) => {
                const osc = this.ctx.createOscillator(); osc.type = 'square';
                const g = this.ctx.createGain();
                osc.frequency.value = freq;
                g.gain.setValueAtTime(0.1, now + i*0.1);
                g.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.2);
                osc.connect(g); g.connect(this.master);
                osc.start(now + i*0.1); osc.stop(now + i*0.1 + 0.2);
            });
        }
    }
    const SFX = new ArcadeAudio();

    // --- 2. PHYSICS ENGINE (Matter.js) ---
    class PhysicsHero {
        constructor() {
            this.canvas = document.getElementById('physics-canvas');
            this.width = window.innerWidth;
            this.height = window.innerHeight * 0.9;
            this.engine = Matter.Engine.create();
            this.world = this.engine.world;
            this.render = Matter.Render.create({
                canvas: this.canvas,
                engine: this.engine,
                options: {
                    width: this.width, height: this.height,
                    wireframes: false, background: 'transparent'
                }
            });
            this.tokens = [];
            this.init();
        }

        init() {
            // Boundaries (invisible walls)
            const wallOpt = { isStatic: true, render: { visible: false } };
            Matter.World.add(this.world, [
                Matter.Bodies.rectangle(this.width/2, this.height+50, this.width, 100, wallOpt), // Floor
                Matter.Bodies.rectangle(-50, this.height/2, 100, this.height, wallOpt), // Left
                Matter.Bodies.rectangle(this.width+50, this.height/2, 100, this.height, wallOpt) // Right
            ]);

            // Mouse Interaction
            this.mouseConstraint = Matter.MouseConstraint.create(this.engine, {
                mouse: Matter.Mouse.create(this.canvas),
                constraint: { stiffness: 0.1, render: { visible: false } }
            });
            Matter.World.add(this.world, this.mouseConstraint);

            // Spawn Tokens
            RESOURCES.forEach((res, i) => this.spawnToken(res, i));

            // Run
            Matter.Runner.run(this.engine);
            Matter.Render.run(this.render);
            window.addEventListener('resize', () => this.resize());
        }

        spawnToken(res, i) {
            const size = window.innerWidth < 768 ? 80 : 120;
            // Create circular body with image texture
            const token = Matter.Bodies.circle(
                Math.random() * this.width, -100 - (i * 100), size/2,
                {
                    restitution: 0.8, // Bouncy
                    friction: 0.05,
                    render: {
                        sprite: {
                            texture: res.url.replace('w=500', `w=${size}&h=${size}&fit=crop&crop=faces`),
                            xScale: 1, yScale: 1
                        }
                    },
                    plugin: { data: res } // Store data for click handler
                }
            );
            // Add a glowing border effect using a secondary constraint/body feels too complex for this demo,
            // relying on CSS filters on the canvas for now (simpler approach below).
            this.tokens.push(token);
            Matter.World.add(this.world, token);
        }

        resize() {
            this.width = window.innerWidth; this.height = window.innerHeight * 0.9;
            this.render.options.width = this.width; this.render.options.height = this.height;
            this.render.canvas.width = this.width; this.render.canvas.height = this.height;
            // Need to recreate walls on resize in a full app
        }
    }

    // --- 3. APP LOGIC ---

    // Init Physics
    const physics = new PhysicsHero();

    // Handle Physics Token Click (Dispense Prize)
    Matter.Events.on(physics.mouseConstraint, 'mousedown', (event) => {
        SFX.enable();
        const mousePos = event.mouse.position;
        const clickedBodies = Matter.Query.point(physics.tokens, mousePos);

        if (clickedBodies.length > 0) {
            const body = clickedBodies[0];
            const data = body.plugin.data;
            dispensePrize(body, data);
        }
    });

    // Dispense Animation Sequence
    function dispensePrize(body, data) {
        SFX.playBlip();

        // 1. Freeze the body
        Matter.Body.setStatic(body, true);

        // 2. Animate it dropping to the chute
        const chute = document.getElementById('prize-door').getBoundingClientRect();
        const targetX = chute.left + chute.width / 2;
        const targetY = chute.top + 50;

        // Canvas position of body
        const startX = body.position.x;
        const startY = body.position.y;

        // We need to fake the drop visual since it's inside canvas.
        // Simpler approach: Remove from physics world, create a DOM element clone to animate.
        Matter.World.remove(physics.world, body);

        const clone = document.createElement('img');
        clone.src = body.render.sprite.texture;
        clone.style.position = 'fixed';
        clone.style.left = (startX - 60) + 'px'; clone.style.top = (startY - 60) + 'px';
        clone.style.width = '120px'; clone.style.height = '120px'; clone.style.borderRadius = '50%';
        clone.style.zIndex = 900; clone.style.border = '4px solid var(--c-neon-cyan)';
        document.body.appendChild(clone);

        gsap.to(clone, {
            x: targetX - startX,
            y: targetY - startY,
            rotation: 720,
            scale: 0.5,
            duration: 0.8,
            ease: 'power3.in',
            onComplete: () => {
                SFX.playClunk();
                clone.remove();
                document.getElementById('prize-door').classList.add('collecting');
                setTimeout(() => document.getElementById('prize-door').classList.remove('collecting'), 500);
                openModal(data);
            }
        });
    }

    // Modal Logic
    const modal = document.getElementById('modal-layer');
    function openModal(data) {
        setTimeout(() => {
            SFX.playWin();
            document.getElementById('pc-img').src = data.url.replace('w=500', 'w=1200');
            document.getElementById('pc-title').innerText = data.title;
            modal.classList.add('active');
        }, 600); // Delay for chute animation
    }
    document.getElementById('pc-close').onclick = () => modal.classList.remove('active');

    // Button Interactions
    document.querySelectorAll('.arcade-btn').forEach(btn => {
        btn.addEventListener('mousedown', function() {
            SFX.enable(); SFX.playBlip(); this.classList.add('pressed');
        });
        btn.addEventListener('mouseup', function() { this.classList.remove('pressed'); });
        btn.addEventListener('mouseleave', function() { this.classList.remove('pressed'); });
    });

    // Infinite Strip Population
    const strip = document.getElementById('infinite-strip');
    const stripContent = RESOURCES.map(res => `
            <div class="strip-item interact">
                <img src="${res.url}" class="strip-img">
            </div>
        `).join('');
    strip.innerHTML = stripContent + stripContent; // Duplicate for loop

    // Custom Cursor
    window.addEventListener('mousemove', e => {
        gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.1 });
        if(e.target.closest('.interact')) document.body.classList.add('hover-interact');
        else document.body.classList.remove('hover-interact');
    });

    // Init Smooth Scroll for page body
    const lenis = new Lenis();
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

</script>
</body>
</html>
