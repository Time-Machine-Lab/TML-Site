<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级壁纸资源池 - 筛选器版</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            padding-bottom: 100px; /* 为底部栏留空 */
        }

        /* 头部样式 */
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; letter-spacing: 2px; color: #fff; font-size: 24px; }
        .subtitle { color: #666; font-size: 12px; margin-top: 5px; }

        /* 筛选器样式 */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .filter-btn {
            background: #111;
            border: 1px solid #333;
            color: #888;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .filter-btn:hover { border-color: #666; color: #fff; }
        .filter-btn.active {
            background: #ccff00;
            color: #000;
            border-color: #ccff00;
            font-weight: bold;
        }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        /* 卡片样式 */
        .card {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent; /* 预留边框位置 */
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        /* 悬停效果 */
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* 选中状态 */
        .card.selected {
            border-color: #ccff00;
            background: #1a1a1a;
        }
        .card.selected::after {
            content: '✔';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ccff00;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .img-box {
            width: 100%;
            height: 180px; /* 稍微调小一点方便浏览 */
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .img-box img.loaded { opacity: 1; }

        .info { padding: 10px; }
        .tag-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }
        .url-preview {
            font-size: 10px;
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 底部操作栏 */
        .action-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 100;
            transition: transform 0.3s;
        }
        .action-bar.hidden { transform: translate(-50%, 150%); }

        .count-info { font-size: 14px; color: #fff; font-weight: bold; }
        .btn-copy {
            background: #ccff00;
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-copy:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
        .btn-clear {
            background: transparent;
            color: #888;
            border: 1px solid #444;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn-clear:hover { border-color: #fff; color: #fff; }

        /* 分类标题 */
        .category-header {
            grid-column: 1 / -1;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 16px;
            color: #ccff00;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<div class="grid" id="gallery"></div>

        { category: 'Minimal', tag: 'Dark Leaf', url: 'https://images.unsplash.com/photo-1533038590840-1cde6e668a91?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Patterns', url: 'https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Minimal Arch', url: 'https://images.unsplash.com/photo-1464938050520-ef2270bb8ce8?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Midnight', url: 'https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Lens', url: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=800&auto=format&fit=crop' },

        { category: 'Minimal', tag: 'Dark Crystal', url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Black Wave', url: 'https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Carbon', url: 'https://images.unsplash.com/photo-1533134486753-c833f0ed4866?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Dark Geo', url: 'https://images.unsplash.com/photo-1436891620584-47fd0e565afb?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Concrete', url: 'https://images.unsplash.com/photo-1487700160041-babef9c3cb55?q=80&w=800&auto=format&fit=crop' },
        { category: 'Minimal', tag: 'Audio', url: 'https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=800&auto=format&fit=crop' }
    ];

    const gallery = document.getElementById('gallery');
    const selectedCountSpan = document.getElementById('selectedCount');
    const actionBar = document.getElementById('actionBar');
    let selectedItems = new Set(); // 存储选中的 URL

    // 初始化渲染
    function renderGallery(filter = 'all') {
        gallery.innerHTML = '';

        resources.forEach((item, index) => {
            // 筛选逻辑
            if (filter !== 'all' && item.category !== filter) return;

            const card = document.createElement('div');
            card.className = 'card';
            // 如果已经在选中集合里，渲染时加上 selected 类
            if (selectedItems.has(item.url)) {
                card.classList.add('selected');
            }

            card.innerHTML = `
                <div class="img-box">
                    <img src="${item.url}" alt="${item.tag}" loading="lazy" onload="this.classList.add('loaded')">
                </div>
                <div class="info">
                    <span class="tag-label">${item.category} / ${item.tag}</span>
                    <div class="url-preview">${item.url}</div>
                </div>
            `;

            // 点击切换选中状态
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                if (card.classList.contains('selected')) {
                    selectedItems.add(item); // 存入整个对象
                } else {
                    // 从 Set 中移除 (需要遍历找到对应对象，因为对象引用不同)
                    for (let s of selectedItems) {
                        if (s.url === item.url) selectedItems.delete(s);
                    }
                }
                updateActionBar();
            });

            gallery.appendChild(card);
        });
    }

    // 更新底部栏状态
    function updateActionBar() {
        const count = selectedItems.size;
        selectedCountSpan.innerText = count;

        if (count > 0) {
            actionBar.classList.remove('hidden');
        } else {
            actionBar.classList.add('hidden');
        }
    }

    // 复制功能
    function copySelected() {
        const itemsArray = Array.from(selectedItems);
        // 生成 JS 对象格式字符串
        const textToCopy = itemsArray.map(item =>
            `{ tag: '${item.tag}', url: '${item.url}' }`
        ).join(',\n');

        const tempInput = document.createElement('textarea');
        tempInput.value = textToCopy;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);

        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.background = "#fff";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#ccff00";
        }, 1500);
    }

    // 清除选择
    function clearSelection() {
        selectedItems.clear();
        document.querySelectorAll('.card.selected').forEach(card => card.classList.remove('selected'));
        updateActionBar();
    }

    // 绑定筛选按钮事件
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            // 移除其他按钮激活状态
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            // 激活当前按钮
            e.target.classList.add('active');
            // 重新渲染
            renderGallery(e.target.dataset.filter);
        });
    });

    // 启动
    renderGallery();

</script>
</body>
