<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallpaper Preview Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Apple Dark Mode Palette */
            --bg-color: #000000;
            --glass-material: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --accent-color: #0A84FF;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            
            /* Animation Curves */
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1); /* 弹性 */
            --ease-smooth: cubic-bezier(0.33, 1, 0.68, 1);       /* 丝滑 */
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 1. 沉浸式环境背景 (Ambient Light) --- */
        .ambient-layer {
            position: absolute; inset: -10%;
            width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(80px) saturate(1.5) brightness(0.6);
            z-index: 0;
            opacity: 0; transition: opacity 1.2s ease;
            transform: translate3d(0,0,0); /* 开启硬件加速 */
        }
        .ambient-layer.active { opacity: 1; }

        /* --- 2. 顶部导航栏 (Minimal Header) --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
            pointer-events: none; /* 让鼠标穿透，不阻挡操作 */
        }
        
        .brand {
            font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
            color: rgba(255,255,255,0.9); text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: auto; display: flex; align-items: center; gap: 8px;
        }
        .brand span { opacity: 0.5; font-weight: 400; }

        .close-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
            transition: all 0.3s var(--ease-smooth);
        }
        .close-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
        .close-btn svg { width: 14px; height: 14px; fill: currentColor; }

        /* --- 3. 核心舞台 (The Stage) --- */
        .stage {
            flex: 1; position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            perspective: 2000px; /* 增强3D透视感 */
            padding-bottom: 120px; /* 为底部 Dock 留空 */
        }

        .scene-container {
            position: relative;
            max-width: 85vw; max-height: 75vh;
            /* 初始进场动画 */
            opacity: 0; transform: scale(0.95) translateY(20px);
            animation: sceneEnter 1s var(--ease-smooth) forwards 0.2s;
            transition: transform 0.6s var(--ease-smooth);
            filter: drop-shadow(0 50px 100px rgba(0,0,0,0.6)); /* 高级投影 */
        }

        @keyframes sceneEnter { to { opacity: 1; transform: scale(1) translateY(0); } }

        .base-img {
            display: block; max-width: 100%; max-height: 75vh; height: auto;
            border-radius: 4px; pointer-events: none;
            user-select: none; -webkit-user-drag: none;
        }

        /* 渲染层结构 (保持原有逻辑，优化样式) */
        .warp-layer { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; z-index: 20; }
        .screen { background: #000; position: relative; overflow: hidden; backface-visibility: hidden; will-change: transform; }
        .wallpaper { 
            width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transform: scale(1.02); /* 防止白边 */
            transition: background-image 0.5s ease-in-out; 
        }

        /* 质感滤镜 */
        .fx-layer div { position: absolute; inset: 0; pointer-events: none; }
        .fx-glare { 
            mix-blend-mode: screen; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.15) 40%, rgba(255,255,255,0) 60%); 
            z-index: 30; opacity: 0.6; 
        }
        .fx-border { box-shadow: inset 0 0 0 1px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(255,255,255,0.1); z-index: 31; }

        /* --- 4. 底部控制 Dock (Floating Island) --- */
        .dock-wrapper {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 200; width: auto; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        /* 模式切换器 (Segmented Control) */
        .mode-switch {
            position: relative;
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255,255,255,0.1);
            padding: 4px; border-radius: 100px;
            display: flex; gap: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .mode-btn {
            position: relative; z-index: 2;
            padding: 8px 24px;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            cursor: pointer; transition: color 0.3s;
        }
        .mode-btn.active { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .mode-indicator {
            position: absolute; top: 4px; left: 4px; bottom: 4px; width: 100px; /* 动态计算 */
            background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 100px; z-index: 1;
            transition: transform 0.4s var(--ease-spring), width 0.3s ease;
        }

        /* 缩略图栏 */
        .thumbs-container {
            height: 96px; padding: 0 16px;
            background: rgba(30, 30, 30, 0.5); backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            opacity: 0; transform: translateY(20px);
            animation: dockUp 0.8s var(--ease-spring) forwards 0.5s;
            overflow: hidden; /* 防止滚动溢出 */
            max-width: 90vw;
        }
        
        @keyframes dockUp { to { opacity: 1; transform: translateY(0); } }

        .thumbs-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding: 16px 4px;
            scroll-behavior: smooth;
            -ms-overflow-style: none; scrollbar-width: none; /* 隐藏滚动条 */
        }
        .thumbs-scroll::-webkit-scrollbar { display: none; }

        .thumb-item {
            flex: 0 0 60px; height: 60px;
            border-radius: 14px;
            background-size: cover; background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s var(--ease-spring);
            opacity: 0.6; filter: grayscale(0.4);
            position: relative; overflow: hidden;
        }
        
        .thumb-item:hover { opacity: 1; filter: grayscale(0); transform: scale(1.1) translateY(-2px); }
        .thumb-item.active { 
            opacity: 1; filter: grayscale(0); 
            border-color: #fff; 
            transform: scale(1.15) translateY(-4px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        /* 选中光效 */
        .thumb-item.active::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
        }

    </style>
</head>
<body>

    <div class="ambient-layer active" id="bgLayer1"></div>
    <div class="ambient-layer" id="bgLayer2"></div>

    <div class="header">
        <div class="brand">
            Mockup<span>Viewer</span>
        </div>
        <div class="close-btn" onclick="/* window.close() 或 返回逻辑 */ alert('Close Preview')">
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
    </div>

    <div class="stage">
        <div class="scene-container" id="sceneBox">
            <img id="baseImg" class="base-img" src="" crossorigin="anonymous">
            
            <div class="warp-layer" id="warpLayer">
                <div class="screen" id="screen">
                    <div class="wallpaper" id="wallpaper"></div>
                    <div class="fx-layer">
                        <div class="fx-border" id="fxBorder"></div>
                        <div class="fx-glare"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="dock-wrapper">
        <div class="mode-switch">
            <div class="mode-indicator" id="switchIndicator"></div>
            <div class="mode-btn active" onclick="switchMode('wallpaper', this)">Wallpaper</div>
            <div class="mode-btn" onclick="switchMode('scene', this)">Scene</div>
        </div>

        <div class="thumbs-container">
            <div class="thumbs-scroll" id="thumbsList">
                </div>
        </div>
    </div>

    <script>
        // --- 1. Mock Data (模拟数据) ---
        // 实际开发中，这些 anchor 数据应由构建工具生成的 JSON 提供
        const SCENES = [
            {
                id: 'iphone-hand',
                title: 'iPhone 15 Pro Max',
                device: 'iphone',
                src: 'https://images.unsplash.com/photo-1512054502232-120feb11f720?q=80&w=1500', // 手持 iPhone
                // 预估锚点 (百分比) - 仅做演示，实际需精准数据
                anchors: [ {x:0.365, y:0.22}, {x:0.685, y:0.35}, {x:0.56, y:0.78}, {x:0.21, y:0.62} ],
                config: { radius: 120, bright: 100 }
            },
            {
                id: 'macbook-dark',
                title: 'MacBook Pro',
                device: 'mac',
                src: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca4?q=80&w=1500', // MacBook
                anchors: [ {x:0.18, y:0.18}, {x:0.82, y:0.18}, {x:0.82, y:0.85}, {x:0.18, y:0.85} ],
                config: { radius: 10, bright: 95 }
            },
            {
                id: 'ipad-table',
                title: 'iPad Air',
                device: 'ipad',
                src: 'https://images.unsplash.com/photo-1544256718-3bcf237f3974?q=80&w=1500', // iPad
                anchors: [ {x:0.15, y:0.15}, {x:0.85, y:0.15}, {x:0.85, y:0.85}, {x:0.15, y:0.85} ],
                config: { radius: 30, bright: 100 }
            }
        ];

        const WALLPAPERS = [
            'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800', // Abstract
            'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800',     // Neon
            'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800',   // Mountain
            'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=800',   // Fluid
            'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=800',   // Purple
            'https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?w=800'    // Dark Flow
        ];

        const DEVICE_PRESETS = {
            iphone: { w: 1179, h: 2556 },
            mac:    { w: 1600, h: 1000 },
            ipad:   { w: 2048, h: 2732 }
        };

        // --- 2. State & Elements ---
        const state = {
            mode: 'wallpaper', // 'wallpaper' | 'scene'
            sIdx: 0,
            wIdx: 0,
            bgToggle: false // 用于背景双缓冲切换
        };

        const els = {
            base: document.getElementById('baseImg'),
            warp: document.getElementById('warpLayer'),
            screen: document.getElementById('screen'),
            wp: document.getElementById('wallpaper'),
            border: document.getElementById('fxBorder'),
            thumbs: document.getElementById('thumbsList'),
            bg1: document.getElementById('bgLayer1'),
            bg2: document.getElementById('bgLayer2'),
            indicator: document.getElementById('switchIndicator')
        };

        // --- 3. Initialization ---
        window.onload = () => {
            initScene(0);
            renderThumbs();
            updateIndicator(document.querySelector('.mode-btn.active'));
        };

        // --- 4. Logic Functions ---

        // 切换模式 (Wallpaper / Scene)
        function switchMode(mode, btn) {
            if(state.mode === mode) return;
            state.mode = mode;
            
            // UI 更新
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateIndicator(btn);

            // 重新渲染缩略图
            const container = document.querySelector('.thumbs-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                renderThumbs();
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 200);
        }

        // 移动指示器动画
        function updateIndicator(btn) {
            const rect = btn.getBoundingClientRect();
            const parentRect = btn.parentElement.getBoundingClientRect();
            els.indicator.style.width = rect.width + 'px';
            els.indicator.style.transform = `translateX(${rect.left - parentRect.left}px)`;
        }

        // 渲染缩略图列表
        function renderThumbs() {
            els.thumbs.innerHTML = '';
            const list = state.mode === 'wallpaper' ? WALLPAPERS : SCENES;
            const currentIdx = state.mode === 'wallpaper' ? state.wIdx : state.sIdx;

            list.forEach((item, i) => {
                const url = state.mode === 'wallpaper' ? item : item.src;
                const div = document.createElement('div');
                div.className = `thumb-item ${i === currentIdx ? 'active' : ''}`;
                div.style.backgroundImage = `url(${url})`;
                div.onclick = () => handleSelect(i, div);
                els.thumbs.appendChild(div);
            });
        }

        // 处理选择逻辑
        function handleSelect(idx, el) {
            // UI 状态
            document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            if (state.mode === 'wallpaper') {
                state.wIdx = idx;
                updateWallpaper();
            } else {
                state.sIdx = idx;
                initScene(idx);
            }
        }

        // 更新壁纸 + 背景环境光
        function updateWallpaper() {
            const url = WALLPAPERS[state.wIdx];
            
            // 屏幕内壁纸更新
            els.wp.style.backgroundImage = `url(${url})`;

            // 环境背景双缓冲切换 (Cross-fade)
            state.bgToggle = !state.bgToggle;
            const activeBg = state.bgToggle ? els.bg2 : els.bg1;
            const inactiveBg = state.bgToggle ? els.bg1 : els.bg2;
            
            activeBg.style.backgroundImage = `url(${url})`;
            activeBg.classList.add('active');
            inactiveBg.classList.remove('active');
        }

        // 加载场景 (模拟 Matrix 计算)
        function initScene(idx) {
            const s = SCENES[idx];
            
            // 图片加载逻辑
            els.base.style.opacity = 0.8; // 加载中视觉反馈
            els.base.src = s.src;
            
            els.base.onload = () => {
                els.base.style.opacity = 1;
                const imgW = els.base.offsetWidth;
                const imgH = els.base.offsetHeight;

                // 设置屏幕尺寸
                const preset = DEVICE_PRESETS[s.device];
                els.screen.style.width = preset.w + 'px';
                els.screen.style.height = preset.h + 'px';
                
                // 设置圆角
                const r = s.config.radius || 0;
                els.screen.style.borderRadius = r + 'px';
                els.border.style.borderRadius = r + 'px';

                // --- 核心：计算 Matrix3D ---
                // 将百分比锚点转换为像素
                const points = s.anchors.map(p => ({
                    x: p.x * imgW,
                    y: p.y * imgH
                }));

                // 简单的自动适配 fallback (如果没有锚点数据)
                if(points.length === 0) {
                     // 默认为中心缩放
                }

                const m = solveHomography(preset.w, preset.h, points);
                els.warp.style.transform = `matrix3d(${m})`;
                
                updateWallpaper();
            };
        }

        // --- Matrix 算法 (与构建工具保持一致) ---
        function solveHomography(w,h,p){const s=[0,0,w,0,w,h,0,h],d=[p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y],A=[],b=[];for(let i=0;i<4;i++){let sx=s[i*2],sy=s[i*2+1],dx=d[i*2],dy=d[i*2+1];A.push([sx,sy,1,0,0,0,-sx*dx,-sy*dx]);b.push(dx);A.push([0,0,0,sx,sy,1,-sx*dy,-sy*dy]);b.push(dy);}let n=8;for(let i=0;i<n;i++){let m=i;for(let j=i+1;j<n;j++)if(Math.abs(A[j][i])>Math.abs(A[m][i]))m=j;[A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];for(let j=i+1;j<n;j++){let c=-A[j][i]/A[i][i];for(let k=i;k<n;k++)A[j][k]+=c*A[i][k];b[j]+=c*b[i];}}let x=[];for(let i=n-1;i>=0;i--){let t=0;for(let j=i+1;j<n;j++)t+=A[i][j]*x[j];x[i]=(b[i]-t)/A[i][i];}return [x[0],x[3],0,x[6],x[1],x[4],0,x[7],0,0,1,0,x[2],x[5],0,1].join(',');}

    </script>
</body>
