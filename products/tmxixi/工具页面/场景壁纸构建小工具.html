<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Mockup Studio Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(28, 28, 30, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #0A84FF;
            --text-main: #fff;
            --text-sub: #86868b;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; user-select: none; }

        body {
            margin: 0; background: var(--bg); color: var(--text-main); height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden; display: flex;
        }

        /* --- 1. 核心舞台区 --- */
        .workspace {
            flex: 1 1 70%; position: relative; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 40px 40px;
            overflow: hidden; cursor: default;
        }

        /* 场景容器 (支持平移缩放) */
        .scene-container {
            position: relative; line-height: 0;
            box-shadow: 0 100px 200px -50px rgba(0,0,0,0.8);
            transition: transform 0.6s var(--ease-out), opacity 0.4s;
        }

        .base-img {
            display: block; max-width: 85vw; max-height: 85vh;
            pointer-events: none; border-radius: 4px;
            will-change: transform;
        }

        /* --- 2. 3D 渲染引擎层 --- */
        .warp-layer {
            position: absolute; top: 0; left: 0;
            transform-origin: 0 0; pointer-events: none; z-index: 10;
        }

        /* 屏幕本体 */
        .screen {
            background: #000; position: relative; overflow: hidden;
            /* 硬件加速抗锯齿 */
            will-change: transform; backface-visibility: hidden;
            z-index: 10;
        }

        /* 壁纸层 */
        .wallpaper {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: filter 0.2s; transform: scale(1.01); /* 防止白边 */
        }

        .edge-blend {
            position: absolute;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            border-radius: var(--edge-radius, 0px);
            mix-blend-mode: soft-light;
            box-shadow:
                0 0 var(--edge-blur, 0px) var(--edge-spread, 0px) rgba(0,0,0,var(--edge-opacity, 0.6)),
                0 0 calc(var(--edge-blur, 0px) * 1.8) calc(var(--edge-spread, 0px) * 1.6) rgba(0,0,0,0.18);
        }

        /* --- 3. 真实感滤镜组 --- */
        .fx-layer { position: absolute; inset: 0; pointer-events: none; z-index: 30; }

        /* 物理黑边 */
        .fx-border { position: absolute; inset: 0; box-shadow: inset 0 0 0 1px #000; z-index: 31; }
        /* 外扩黑边 */
        .fx-outer {
            position: absolute; inset: 0; z-index: 29; pointer-events: none;
            box-shadow: none;
        }
        /* 内阴影 (增加厚度感) */
        .fx-shadow { position: absolute; inset: 0; z-index: 32; }
        /* 表面反光 */
        .fx-glare {
            position: absolute; inset: 0; z-index: 33; mix-blend-mode: screen; opacity: 0;
            background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.1) 45%, rgba(255,255,255,0.02) 55%, transparent 65%);
        }
        /* 胶片噪点 (关键: 消除CG感) */
        .fx-noise {
            position: absolute; inset: 0; z-index: 34; mix-blend-mode: overlay; opacity: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* --- 4. OS UI 模拟 --- */
        .os-ui {
            position: absolute; inset: 0; z-index: 20; color: #fff;
            display: flex; flex-direction: column; transition: color 0.3s;
        }
        .os-ui .ui-scale {
            width: calc(100% / var(--ui-scale, 1));
            height: calc(100% / var(--ui-scale, 1));
            transform: scale(var(--ui-scale, 1));
            transform-origin: top left;
        }
        .os-ui.dark { color: #000; }
        .text-shadow { text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .os-ui.dark .text-shadow { text-shadow: none; }

        /* iPhone 16 Pro Layout (High-Res 1179px width) */
        .iphone-ui { height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 60px; position: relative; }
        
        /* 灵动岛: 370px 宽 */
        .island { width: 366px; height: 106px; background: #000; border-radius: 53px; transition: 0.3s; margin-bottom: 130px; z-index: 2; }
        
        /* 状态栏: 分左右 */
        .iphone-status-left {
            position: absolute; top: 86px; left: 80px; height: 60px;
            display: flex; align-items: center; color: #fff; gap: 12px;
            font-size: 42px; font-weight: 600; letter-spacing: 1px;
        }
        .iphone-status-right {
            position: absolute; top: 92px; right: 80px; height: 60px;
            display: flex; align-items: center; gap: 18px; color: #fff; font-size: 42px; font-weight: 600;
        }
        .os-ui.dark .iphone-status-left, .os-ui.dark .iphone-status-right { color: #000; }
        
        .iphone-date { font-size: 64px; font-weight: 600; opacity: 0.9; margin-top: 0; margin-bottom: 48px; letter-spacing: 1px; text-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        
        .iphone-time { 
            font-size: 300px; line-height: 1; letter-spacing: -4px; 
            font-family: 'Saira Stencil One', 'SF Pro Rounded', system-ui, sans-serif;
            text-shadow: 0 10px 40px rgba(0,0,0,0.16); margin-bottom: 70px; margin-top: 0;
        }
        
        .iphone-widgets {
            display: flex; gap: 72px; justify-content: center; align-items: center;
            width: 100%; padding: 0 40px;
        }
        .iphone-widget-circle {
            width: 172px; height: 172px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .iphone-widget-circle svg { width: 88px; height: 88px; fill: currentColor; }

        
        .iphone-bottom { 
            position: absolute; inset: 0; pointer-events: none; z-index: 5;
        }
        
        .icon-btn { 
            position: absolute; bottom: 140px;
            width: 150px; height: 150px; background: rgba(30,30,30,0.45); border-radius: 50%; 
            backdrop-filter: blur(40px); display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: 0.2s;
            pointer-events: auto;
        }
        .iphone-bottom .icon-btn:first-child { left: 140px; }
        .iphone-bottom .icon-btn:last-child { right: 140px; }

        .icon-btn svg { width: 68px; height: 68px; fill: #fff; display: block; }
        
        .home-bar { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); width: 520px; height: 18px; background: #fff; border-radius: 100px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 6; }

        /* macOS Layout */
        .mac-ui { height: 100%; display: flex; flex-direction: column; }
        .mac-bar { height: 30px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 13px; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); }
        .os-ui.dark .mac-bar { background: rgba(255,255,255,0.4); color: #000; }
        .mac-dock-wrap { margin-top: auto; margin-bottom: 20px; display: flex; justify-content: center; }
        .mac-dock { height: 62px; padding: 6px; background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border-radius: 16px; display: flex; gap: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .app-icon { width: 48px; height: 48px; background: linear-gradient(to bottom, #f5f5f5, #d4d4d4); border-radius: 11px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

        /* iPad Layout */
        .ipad-ui { height: 100%; display: flex; flex-direction: column; padding: 22px 30px 26px 30px; gap: 18px; }
        .ipad-bar { height: 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 13px; opacity: 0.9; }
        .ipad-widgets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .ipad-widget { height: 120px; border-radius: 18px; background: rgba(255,255,255,0.15); backdrop-filter: blur(16px); }
        .ipad-icons { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-top: 6px; }
        .ipad-icon { height: 58px; border-radius: 14px; background: rgba(255,255,255,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .ipad-dock { margin-top: auto; height: 68px; padding: 6px 10px; border-radius: 18px; background: rgba(255,255,255,0.16); display: flex; gap: 12px; justify-content: center; align-items: center; }
        .ipad-dock .ipad-icon { height: 52px; width: 52px; }

        /* --- 5. 交互控制层 --- */
        .controls-layer { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .guide-svg { width: 100%; height: 100%; position: absolute; top:0; left:0; }

        /* 智能热区：也是整体移动的手柄 */
        .guide-path {
            fill: rgba(10, 132, 255, 0.05); stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 6;
            vector-effect: non-scaling-stroke; pointer-events: auto; cursor: move; transition: fill 0.2s;
        }
        .guide-path:hover { fill: rgba(10, 132, 255, 0.15); }

        .handle {
            position: absolute; width: 14px; height: 14px; background: #fff;
            border: 2px solid var(--accent); border-radius: 50%;
            transform: translate3d(var(--x, 0px), var(--y, 0px), 0) translate(-50%, -50%);
            cursor: crosshair; z-index: 101; pointer-events: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .handle:hover {
            transform: translate3d(var(--x, 0px), var(--y, 0px), 0) translate(-50%, -50%) scale(1.8);
            z-index: 102; background: var(--accent); border-color: #fff;
        }

        /* --- 6. 悬浮控制面板 (Glassmorphism) --- */
        .panel {
            position: relative; order: -1; flex: 0 0 30%; width: 30vw; min-width: 300px; max-width: 420px; height: 100vh;
            background: var(--panel); backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border); border-radius: 0 24px 24px 0;
            padding: 24px; display: flex; flex-direction: column; gap: 24px; z-index: 200;
            box-shadow: 20px 0 60px rgba(0,0,0,0.5);
            transition: transform 0.5s var(--ease-out), opacity 0.4s;
            overflow-y: auto;
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .preview-btn {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .preview-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .label { font-size: 11px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }

        /* 按钮组 */
        .btn-group { display: flex; gap: 8px; }
        .btn {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid transparent; color: var(--text-sub);
            padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3); }

        /* 滑块 */
        .slider-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .slider-head { display: flex; justify-content: space-between; font-size: 12px; color: #ccc; }
        input[type="range"] {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* 壁纸网格 */
        .wp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .wp-item {
            aspect-ratio: 1; border-radius: 8px; background-size: cover; cursor: pointer;
            border: 2px solid transparent; opacity: 0.6; transition: 0.2s;
        }
        .wp-item:hover, .wp-item.active { opacity: 1; border-color: var(--accent); }

        /* --- 7. 预览 Dock 栏 --- */
        .dock-bar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(120px);
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.15); padding: 12px 24px; border-radius: 40px;
            display: flex; gap: 16px; align-items: center; z-index: 300;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .dock-thumbs { display: flex; gap: 10px; }
        .dock-thumb {
            width: 44px; height: 44px; border-radius: 10px; background-size: cover;
            cursor: pointer; opacity: 0.6; transition: 0.2s; border: 2px solid transparent;
        }
        .dock-thumb:hover, .dock-thumb.active { transform: translateY(-6px) scale(1.1); opacity: 1; border-color: #fff; }
        .dock-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }
        .dock-exit {
            background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .dock-exit:hover { background: rgba(255,255,255,0.1); }

        /* 预览模式状态 */
        body.preview .panel { transform: translateX(-20px); opacity: 0; pointer-events: none; width: 0; min-width: 0; padding: 0; border: 0; flex: 0 0 0; }
        body.preview .controls-layer { opacity: 0; pointer-events: none; }
        body.preview .scene-container { transform: scale(1.02); }
        body.preview .dock-bar { transform: translateX(-50%) translateY(0); opacity: 1; }
        body.preview .workspace { flex: 1 1 100%; }

        /* 放大镜 8x */
        .loupe {
            position: fixed; width: 220px; height: 220px; border: 3px solid #fff; border-radius: 50%;
            background: #000; overflow: hidden; pointer-events: none; z-index: 999; display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .loupe img { position: absolute; transform-origin: 0 0; will-change: transform; }
        .loupe .cross {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            background: #ff3b30; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.6), 0 0 8px rgba(255,59,48,0.7);
        }

    </style>
</head>
<body>

<div class="workspace">
    <div class="scene-container" id="sceneBox">
        <img id="baseImg" class="base-img" src="https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=2000" crossorigin="anonymous" decoding="async">

        <div class="warp-layer" id="warpLayer">
            <div class="screen" id="screen">
                <div class="wallpaper" id="wallpaper"></div>

                <div class="fx-layer">
                    <div class="fx-noise" id="fxNoise"></div>
                    <div class="fx-glare" id="fxGlare"></div>
                    <div class="fx-inner-shadow" id="fxShadow"></div>
                    <div class="fx-border" id="fxBorder"></div>
                </div>

                <div class="os-ui text-shadow" id="osUI"></div>
            </div>
            <div class="edge-blend" id="edgeBlend"></div>
            <div class="fx-outer" id="fxOuter"></div>
        </div>

        <div class="controls-layer" id="controls">
            <svg class="guide-svg"><path class="guide-path" id="guidePath" d=""></path></svg>
            <div class="handle" data-i="0"></div>
            <div class="handle" data-i="1"></div>
            <div class="handle" data-i="2"></div>
            <div class="handle" data-i="3"></div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="panel-header">
        <div class="brand">Mockup Studio Pro</div>
        <button class="preview-btn" onclick="togglePreview()">🚀 预览 (Esc)</button>
    </div>

    <div>
        <div class="label">Device & Scene</div>
        <div style="margin-bottom:10px">
            <button class="btn" style="width:100%; border:1px dashed rgba(255,255,255,0.2)" onclick="document.getElementById('fileIn').click()">📂 上传本地场景...</button>
            <input type="file" id="fileIn" hidden accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="btn-group" style="margin-bottom:10px">
            <button class="btn" onclick="setDevice('mac', this)">MacBook</button>
            <button class="btn active" onclick="setDevice('iphone', this)">iPhone 16</button>
            <button class="btn" onclick="setDevice('ipad', this)">iPad</button>
        </div>
        <div class="btn-group">
            <button class="btn" onclick="toggleUI(this)">UI: 显示</button>
            <button class="btn" onclick="toggleColor(this)">反色模式</button>
        </div>
    </div>

    <div>
        <div class="label">Test Wallpapers</div>
        <div class="wp-grid" id="wpGrid"></div>
    </div>

    <div>
        <div class="label">Realism Engine (画质增强)</div>

        <div class="slider-wrap">
            <div class="slider-head"><span>Radius (圆角)</span> <span id="v-rad">12</span></div>
            <input type="range" min="0" max="200" value="12" oninput="updateFx('radius', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Bezel (黑边)</span> <span id="v-bez">50%</span></div>
            <input type="range" min="0" max="100" value="50" oninput="updateFx('bezel', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Brightness (屏幕亮度)</span> <span id="v-br">100%</span></div>
            <input type="range" min="50" max="150" value="100" oninput="updateFx('bright', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Glare (表面反光)</span> <span id="v-gl">20%</span></div>
            <input type="range" min="0" max="100" value="20" oninput="updateFx('glare', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Grain (胶片噪点)</span> <span id="v-no">0%</span></div>
            <input type="range" min="0" max="50" value="0" oninput="updateFx('noise', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Edge Blend (边缘融合)</span> <span id="v-ed">0</span></div>
            <input type="range" min="0" max="80" value="0" oninput="updateFx('edge', this.value)">
        </div>
        <div class="slider-wrap">
            <div class="slider-head"><span>Opacity (辅助对齐)</span> <span id="v-op">0.9</span></div>
            <input type="range" min="0.2" max="1" step="0.1" value="0.9" oninput="updateFx('opacity', this.value)">
        </div>
    </div>

    <div style="margin-top:auto">
        <div class="label">Export</div>
        <textarea id="jsonOut" style="width:100%; height:50px; background:#111; color:#0f0; border:1px solid #333; border-radius:8px; resize:none; font-size:10px; padding:8px; margin-bottom:8px" readonly></textarea>
        <button class="btn" style="width:100%; background:var(--accent); color:#fff" onclick="copyJson()">复制 JSON 配置</button>
    </div>
</div>

<div class="dock-bar">
    <div style="font-size:12px; font-weight:700; color:#fff; margin-right:8px">SWITCHER</div>
    <div class="dock-sep"></div>
    <div class="dock-thumbs" id="dockThumbs"></div>
    <div class="dock-sep"></div>
    <button class="dock-exit" onclick="togglePreview()">退出预览</button>
</div>

<div class="loupe" id="loupe"><img id="loupeImg" src="" crossorigin="anonymous"><div class="cross"></div></div>

<script>
    // --- 1. 数据配置 ---
    const PRESETS = {
        mac:    { w: 1600, h: 1000, r: 12, b: 10 },
        iphone: { w: 1179, h: 2556, r: 120, b: 15 },
        ipad:   { w: 2048, h: 2732, r: 35, b: 20 }
    };

    const WALLPAPERS = [
        'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600',
        'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=600',
        'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=600',
        'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600',
        'https://images.unsplash.com/photo-1604871000636-074fa5117945?w=600',
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600',
        'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=600',
        'https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?w=600',
        'https://c-ssl.duitang.com/uploads/blog/202512/12/xDSJe8DYH2Vldln.jpeg',
        'https://c-ssl.duitang.com/uploads/blog/202512/12/73Svneb8Se73ynn.jpeg',
        'https://i0.hdslb.com/bfs/album/82f4df869376a7b06384b477829b904f27ddb538.jpg',
        'https://c-ssl.duitang.com/uploads/blog/202512/12/9WSp3OY5S85DMZB.jpeg'
    ];

    const state = {
        device: 'iphone', points: [], imgW: 0, imgH: 0,
        dragging: null, dragStart: {x:0, y:0}, pointsStart: [],
        bezelBase: 10,
        sceneSrc: '',
        sceneExport: '',
        sceneObjectUrl: '',
        pointer: { x: 0, y: 0 },
        style: { radius: 12, bezel: 50, opacity: 0.9, bright: 100, glare: 20, noise: 0, edge: 0 }
    };

    const PERF = { jsonDebounce: 160, loupeMax: 1600, loupeZoom: 6 };
    let renderQueued = false;
    let jsonTimer = null;

    const els = {
        base: document.getElementById('baseImg'), warp: document.getElementById('warpLayer'),
        screen: document.getElementById('screen'), wp: document.getElementById('wallpaper'),
        edgeBlend: document.getElementById('edgeBlend'),

    };

    // --- 2. 初始化 ---
    window.onload = () => {
        initWallpapers();
        if(els.base.complete) initStage(); else els.base.onload = initStage;
        setInterval(updateTime, 1000);
        window.addEventListener('keydown', e => {
            if(e.key === 'Escape') togglePreview();
        });
    };

    function initStage() {
        state.imgW = els.base.offsetWidth; state.imgH = els.base.offsetHeight;
        state.sceneSrc = els.base.src;
        state.sceneExport = els.base.src;
        updateLoupeSource();
        setDevice('iphone'); // 默认设备
    }

    function initWallpapers() {
        const grid = document.getElementById('wpGrid');
        const dock = document.getElementById('dockThumbs');
        WALLPAPERS.forEach((url, i) => {
            // Sidebar Grid
            const t1 = document.createElement('div');
            t1.className = `wp-item ${i===0?'active':''}`;
            t1.style.backgroundImage = `url(${url})`;
            t1.onclick = () => loadWp(url, t1);
            grid.appendChild(t1);
            // Preview Dock
            const t2 = document.createElement('div');
            t2.className = 'dock-thumb';
            t2.style.backgroundImage = `url(${url})`;
            t2.onclick = () => loadWp(url, null);
            dock.appendChild(t2);
        });
        loadWp(WALLPAPERS[0], grid.children[0]);
    }

    function loadWp(url, el) {
        els.wp.style.backgroundImage = `url(${url})`;
        if(el) {
            document.querySelectorAll('.wp-item').forEach(e=>e.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function setDevice(type, btn) {
        state.device = type;
        if(btn) {
            document.querySelectorAll('.btn-group .btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
        }

        const d = PRESETS[type];
        els.screen.style.width = d.w + 'px'; els.screen.style.height = d.h + 'px';

        // 重置锚点 (自适应大小)
        const cx = state.imgW/2, cy = state.imgH/2;
        let w = state.imgW * 0.45, h = w * (d.h/d.w);
        if(h > state.imgH * 0.85) { h = state.imgH * 0.85; w = h * (d.w/d.h); }
        state.points = [
            {x:cx-w/2, y:cy-h/2}, {x:cx+w/2, y:cy-h/2},
            {x:cx+w/2, y:cy+h/2}, {x:cx-w/2, y:cy+h/2}
        ];

        // 重置 UI 参数
        state.bezelBase = d.b;
        updateFx('radius', d.r); document.querySelector('[oninput*="radius"]').value = d.r;
        updateFx('bezel', 50); document.querySelector('[oninput*="bezel"]').value = 50;

        renderOS(); requestRender(); scheduleJsonUpdate();
    }

    // --- 3. 核心交互系统 (Smart Drag) ---
    const controls = document.getElementById('controls');

    controls.addEventListener('mousedown', e => {
        if(document.body.classList.contains('preview')) return;
        state.dragStart = { x: e.clientX, y: e.clientY };
        state.pointsStart = JSON.parse(JSON.stringify(state.points));

        if(e.target.classList.contains('handle')) {
            state.dragging = parseInt(e.target.dataset.i);
            els.loupe.style.display = 'block';
            const z = PERF.loupeZoom;
            els.loupeImg.style.width = (state.imgW*z) + 'px';
            els.loupeImg.style.height = (state.imgH*z) + 'px';
        } else if (e.target.classList.contains('guide-path')) {
            state.dragging = 'move'; // 整体移动
            controls.style.cursor = 'grabbing';
        }
    });

    window.addEventListener('mousemove', e => {
        if(!state.dragging && state.dragging !== 0) return;
        const dx = e.clientX - state.dragStart.x;
        const dy = e.clientY - state.dragStart.y;
        state.pointer = { x: e.clientX, y: e.clientY };

        if(state.dragging === 'move') {
            state.points = state.pointsStart.map(p => ({ x: p.x+dx, y: p.y+dy }));
        } else {
            // 单点变形
            const p = state.points[state.dragging];
            p.x = state.pointsStart[state.dragging].x + dx;
            p.y = state.pointsStart[state.dragging].y + dy;

        }
        requestRender();
    });

    window.addEventListener('mouseup', () => {
        state.dragging = null;
        els.loupe.style.display = 'none';
        controls.style.cursor = 'default';
        updateJson();
    });

    function requestRender() {
        if(renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
            renderQueued = false;
            render();
        });
    }

    function render() {
        // 更新手柄位置
        state.points.forEach((p, i) => {
            els.handles[i].style.setProperty('--x', `${p.x}px`);
            els.handles[i].style.setProperty('--y', `${p.y}px`);
        });
        // 更新 SVG 热区
        const p = state.points;
        els.guide.setAttribute('d', `M${p[0].x},${p[0].y} L${p[1].x},${p[1].y} L${p[2].x},${p[2].y} L${p[3].x},${p[3].y} Z`);
        // 计算 3D 矩阵
        const d = PRESETS[state.device];
        const m = solveHomography(d.w, d.h, state.points);
        els.warp.style.transform = `matrix3d(${m})`;

        // 更新放大镜
        if(state.dragging !== null && state.dragging !== 'move') {
            const z = PERF.loupeZoom;
            const size = 220;
            const half = size / 2;
            const lp = state.pointer;
            const cp = state.points[state.dragging];
            els.loupe.style.left = (lp.x+20)+'px'; els.loupe.style.top = (lp.y-110)+'px';
            els.loupeImg.style.transform = `translate(${-cp.x*z+half}px, ${-cp.y*z+half}px)`;
        }
    }

    function updateTime() {
        const now = new Date();
        const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const d = `${now.getMonth()+1}月${now.getDate()}日 星期${['日','一','二','三','四','五','六'][now.getDay()]}`;
        if(document.getElementById('uiTime')) document.getElementById('uiTime').innerText = t;
        if(document.getElementById('uiDate')) document.getElementById('uiDate').innerText = d;
        if(document.getElementById('macTime')) document.getElementById('macTime').innerText = `${d} ${t}`;
        if(document.getElementById('ipadTime')) document.getElementById('ipadTime').innerText = t;
        if(document.getElementById('ipadDate')) document.getElementById('ipadDate').innerText = d;
    }

    function updateFx(k, v) {
        state.style[k] = parseFloat(v);
        const label = document.getElementById({radius:'v-rad', bezel:'v-bez', bright:'v-br', glare:'v-gl', noise:'v-no', edge:'v-ed', opacity:'v-op'}[k]);
        if(label) label.innerText = v + (k.includes('b')||k.includes('g')||k.includes('n') ? '%' : '');

        if(k==='radius') {
            els.screen.style.borderRadius = v+'px';
            document.getElementById('fxBorder').style.borderRadius = v+'px';
            if(els.fxOuter) els.fxOuter.style.borderRadius = v+'px';
            if(els.edgeBlend) els.edgeBlend.style.setProperty('--edge-radius', `${v}px`);
        }
        if(k==='bezel') {
            const base = state.bezelBase || 10;
            const pct = Math.max(0, Math.min(100, parseFloat(v)));
            const outward = pct > 50 ? ((pct - 50) / 50) * base : 0;
            const inward = pct < 50 ? ((50 - pct) / 50) * base : 0;
            const innerSize = base + inward;
            const outerSize = outward;
            document.getElementById('fxBorder').style.boxShadow = `inset 0 0 0 ${innerSize}px #000`;
            if(els.fxOuter) els.fxOuter.style.boxShadow = outerSize > 0 ? `0 0 0 ${outerSize}px #000` : 'none';
        }
        if(k==='opacity' && !document.body.classList.contains('preview')) els.screen.style.opacity = v;
        if(k==='bright') els.wp.style.filter = `brightness(${v}%)`;
        if(k==='glare') document.getElementById('fxGlare').style.opacity = v/100;
        if(k==='noise') document.getElementById('fxNoise').style.opacity = v/200;
        if(k==='edge') {
            const max = 80;
            const eased = Math.pow(Math.min(Math.max(v, 0), max) / max, 1.6) * max;
            const blur = Math.min(36, eased / 2.6);
            const spread = eased / 2.2;
            const opacity = Math.min(0.55, 0.18 + (eased / max) * 0.32);
            if(els.edgeBlend) {
                els.edgeBlend.style.setProperty('--edge-blur', `${blur.toFixed(1)}px`);
                els.edgeBlend.style.setProperty('--edge-spread', `${spread.toFixed(1)}px`);
                els.edgeBlend.style.setProperty('--edge-opacity', `${opacity.toFixed(2)}`);
            }
        }
        scheduleJsonUpdate();
    }

    // --- 5. 工具函数 ---
    function handleFile(input) {
        if(input.files[0]) {
            const file = input.files[0];
            if(state.sceneObjectUrl) URL.revokeObjectURL(state.sceneObjectUrl);
            const objectUrl = URL.createObjectURL(file);
            state.sceneObjectUrl = objectUrl;
            state.sceneSrc = objectUrl;
            state.sceneExport = file.name;
            els.base.src = objectUrl;
            els.base.onload = () => {
                state.imgW = els.base.offsetWidth;
                state.imgH = els.base.offsetHeight;
                updateLoupeSource();
                resetPoints();
                scheduleJsonUpdate();
            };
        }
    }
    function togglePreview() {
        document.body.classList.toggle('preview');
        els.screen.style.opacity = document.body.classList.contains('preview') ? 1 : state.style.opacity;
    }
    function toggleUI(btn) { els.os.style.display = els.os.style.display==='none'?'flex':'none'; if(btn) btn.classList.toggle('active'); }
    function toggleColor(btn) { els.os.classList.toggle('dark'); if(btn) btn.classList.toggle('active'); }
    function scheduleJsonUpdate() {
        clearTimeout(jsonTimer);
        jsonTimer = setTimeout(updateJson, PERF.jsonDebounce);
    }
    function updateJson() {
        const d = { scene: state.sceneExport || state.sceneSrc || els.base.src, device: state.device, anchors: state.points.map(p=>({x:+(p.x/state.imgW).toFixed(4), y:+(p.y/state.imgH).toFixed(4)})), config: state.style };
        document.getElementById('jsonOut').value = JSON.stringify(d);
    }
    function copyJson() {
        updateJson();
        document.getElementById('jsonOut').select();
        document.execCommand('copy');
        alert('已复制');
    }

    function updateLoupeSource() {
        const img = els.base;
        const maxSide = PERF.loupeMax;
        const nw = img.naturalWidth || img.width;
        const nh = img.naturalHeight || img.height;
        if(!nw || !nh) { els.loupeImg.src = img.src; return; }
        if(Math.max(nw, nh) <= maxSide) { els.loupeImg.src = img.src; return; }
        try {
            const scale = maxSide / Math.max(nw, nh);
            const cw = Math.max(1, Math.round(nw * scale));
            const ch = Math.max(1, Math.round(nh * scale));
            const c = document.createElement('canvas');
            c.width = cw; c.height = ch;
            const ctx = c.getContext('2d', { alpha: false });
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, cw, ch);
            els.loupeImg.src = c.toDataURL('image/jpeg', 0.82);
        } catch (e) {

            els.loupeImg.src = img.src;
        }
    }

    function resetPoints() {
        const d = PRESETS[state.device];
        if(!d) return;
        const cx = state.imgW/2, cy = state.imgH/2;
        let w = state.imgW * 0.45, h = w * (d.h/d.w);
        if(h > state.imgH * 0.85) { h = state.imgH * 0.85; w = h * (d.w/d.h); }
        state.points = [
            {x:cx-w/2, y:cy-h/2}, {x:cx+w/2, y:cy-h/2},
            {x:cx+w/2, y:cy+h/2}, {x:cx-w/2, y:cy+h/2}
        ];
        requestRender();
    }

    // Matrix Math
    function solveHomography(w,h,p){const s=[0,0,w,0,w,h,0,h],d=[p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y],A=[],b=[];for(let i=0;i<4;i++){let sx=s[i*2],sy=s[i*2+1],dx=d[i*2],dy=d[i*2+1];A.push([sx,sy,1,0,0,0,-sx*dx,-sy*dx]);b.push(dx);A.push([0,0,0,sx,sy,1,-sx*dy,-sy*dy]);b.push(dy);}let n=8;for(let i=0;i<n;i++){let m=i;for(let j=i+1;j<n;j++)if(Math.abs(A[j][i])>Math.abs(A[m][i]))m=j;[A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];for(let j=i+1;j<n;j++){let c=-A[j][i]/A[i][i];for(let k=i;k<n;k++)A[j][k]+=c*A[i][k];b[j]+=c*b[i];}}let x=[];for(let i=n-1;i>=0;i--){let t=0;for(let j=i+1;j<n;j++)t+=A[i][j]*x[j];x[i]=(b[i]-t)/A[i][i];}return [x[0],x[3],0,x[6],x[1],x[4],0,x[7],0,0,1,0,x[2],x[5],0,1].join(',');}
