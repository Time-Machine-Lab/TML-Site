<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery Preview Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(30, 30, 30, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --active-border: rgba(255, 255, 255, 0.8);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- 0. 动态背景 (保留) --- */
        .ambient-bg {
            position: absolute; inset: -20%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 70%);
            filter: blur(100px); z-index: 0;
            transition: opacity 1s ease;
        }
        .bg-layer {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.2s ease;
        }
        .bg-layer.active { opacity: 0.4; }

        /* --- 1. 核心舞台 (Center Stage - 保留3D效果) --- */
        .stage-area {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none; /* 让鼠标穿透给两边 */
        }

        /* 增加舞台容器的视差响应 */
        .scene-pivot {
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }

        .scene-container {
            position: relative;
            max-width: 60vw; max-height: 80vh; /* 稍微留出两边空间 */
            perspective: 1500px;
            transform-style: preserve-3d;
            transition: transform 0.8s var(--ease);
        }

        .base-img {
            display: block; max-width: 100%; max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
            opacity: 0; transform: scale(0.95);
            animation: fadeIn 1s var(--ease) forwards;
        }

        @keyframes fadeIn { to { opacity: 1; transform: scale(1); } }

        /* 渲染层 */
        .warp-layer { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        .screen { background: #000; position: relative; overflow: hidden; backface-visibility: hidden; will-change: transform; }
        .wallpaper {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transform: scale(1.02); transition: background-image 0.5s ease;
        }
        .fx-glare {
            position: absolute; inset: 0; pointer-events: none; mix-blend-mode: screen; z-index: 30;
            background: linear-gradient(120deg, rgba(255,255,255,0.1) 0%, transparent 40%);
        }

        /* --- 2. 侧边栏通用样式 (The Sidebars) --- */
        .sidebar {
            position: absolute; top: 0; bottom: 0;
            width: 260px; z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            /* 边缘遮罩：让卡片在顶部和底部自然消融，极具高级感 */
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            pointer-events: none; /* 容器穿透，不挡背景 */
        }
        .sidebar.left { left: 20px; align-items: flex-start; }
        .sidebar.right { right: 20px; align-items: flex-end; }

        .scroll-track {
            height: 80vh; width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            pointer-events: auto; /* 内容可交互 */
            padding: 50vh 0; /* 巨大的内边距，确保第一项和最后一项能滚到正中间 */
            -ms-overflow-style: none; scrollbar-width: none;
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }
        .scroll-track::-webkit-scrollbar { display: none; }

        /* --- 3. 卡片样式 (Cards) --- */
        .card {
            position: relative;
            flex-shrink: 0;
            background-size: cover; background-position: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255,255,255,0.1);

            /* 默认状态：虚化、变暗、去色 */
            filter: grayscale(1) brightness(0.5) blur(3px);
            opacity: 0.5; transform: scale(0.85);
        }

        /* 左侧场景卡片 (宽幅) */
        .card.scene-card { width: 180px; height: 110px; }
        /* 右侧壁纸卡片 (竖幅) */
        .card.wall-card { width: 110px; height: 190px; }

        /* 激活状态 (JS控制) */
        .card.active {
            filter: grayscale(0) brightness(1.1) blur(0);
            opacity: 1; transform: scale(1.1);
            border-color: var(--active-border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .card:hover { border-color: rgba(255,255,255,0.6); opacity: 1; }

        /* 标签 */
        .card-label {
            position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
            font-size: 10px; color: rgba(255,255,255,0.8); white-space: nowrap;
            opacity: 0; transition: 0.3s; letter-spacing: 1px; font-weight: 500;
        }
        .card.active .card-label { opacity: 1; bottom: -28px; }

        /* --- 4. 标题与装饰 (保留原有) --- */
        .ui-deco {
            position: fixed; top: 40px; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 60px;
            pointer-events: none; z-index: 150;
            color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        }

        .icon-btn {
            pointer-events: auto; cursor: pointer;
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; color: #fff;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); color: #fff; border-color: #fff; }
        .icon-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* 品牌 */
        .brand { font-weight: 600; opacity: 0.9; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .brand span { opacity: 0.5; font-weight: 300; }

    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="bg-layer active" id="bg1"></div>
    <div class="bg-layer" id="bg2"></div>
</div>

<div class="ui-deco">
    <div class="brand">NMSL <span>/ Gallery</span></div>
    <div style="display:flex; gap:16px">
        <div class="icon-btn" title="Download" onclick="alert('Download Triggered')">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="icon-btn" title="Close" onclick="window.close()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
</div>

<div class="sidebar left">
    <div class="scroll-track" id="sceneTrack">
    </div>
</div>

<div class="stage-area">
    <div class="scene-pivot" id="scenePivot">
        <div class="scene-container" id="sceneBox">
            <img id="baseImg" class="base-img" src="" crossorigin="anonymous">
            <div class="warp-layer" id="warpLayer">
                <div class="screen" id="screen">
                    <div class="wallpaper" id="wallpaper"></div>
                    <div class="fx-glare"></div>
                    <div style="position:absolute; inset:0; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.8); z-index:31; border-radius:inherit"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="sidebar right">
    <div class="scroll-track" id="wallTrack">
    </div>
</div>

<script>
    // ================= 数据源 (保持不变) =================
    const SCENES = [
        { id: 's1', title: 'iPhone Hand', device: 'iphone', src: 'https://images.unsplash.com/photo-1512054502232-120feb11f720?q=80&w=1200', anchors: [{x:0.365,y:0.22},{x:0.685,y:0.35},{x:0.56,y:0.78},{x:0.21,y:0.62}], config: {w:1179, h:2556, r:120} },
        { id: 's2', title: 'MacBook Pro', device: 'mac', src: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca4?q=80&w=1200', anchors: [{x:0.18,y:0.18},{x:0.82,y:0.18},{x:0.82,y:0.85},{x:0.18,y:0.85}], config: {w:1600, h:1000, r:12} },
        { id: 's3', title: 'iPad Table', device: 'ipad', src: 'https://images.unsplash.com/photo-1544256718-3bcf237f3974?q=80&w=1200', anchors: [{x:0.15,y:0.15},{x:0.85,y:0.15},{x:0.85,y:0.85},{x:0.15,y:0.85}], config: {w:2048, h:2732, r:30} },
        { id: 's4', title: 'Minimal Desk', device: 'mac', src: 'https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=1200', anchors: [{x:0.366,y:0.225},{x:0.686,y:0.354},{x:0.563,y:0.785},{x:0.212,y:0.623}], config: {w:1179, h:2556, r:120} },
        { id: 's5', title: 'Dark Setup', device: 'mac', src: 'https://images.unsplash.com/photo-1593642702821-c8da6771f0c6?q=80&w=1200', anchors: [{x:0.1,y:0.1},{x:0.9,y:0.1},{x:0.9,y:0.9},{x:0.1,y:0.9}], config: {w:1600, h:1000, r:10} }
    ];

    const WALLPAPERS = [
        'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600',
        'https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?w=600',
        'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=600',
        'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=600',
        'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600',
        'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=600',
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600',
        'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=600'
    ];

    // ================= 状态管理 =================
    const els = {
        sceneTrack: document.getElementById('sceneTrack'),
        wallTrack: document.getElementById('wallTrack'),
        base: document.getElementById('baseImg'),
        warp: document.getElementById('warpLayer'),
        screen: document.getElementById('screen'),
        wp: document.getElementById('wallpaper'),
        bg1: document.getElementById('bg1'),
        bg2: document.getElementById('bg2'),
        pivot: document.getElementById('scenePivot')
    };

    let activeSceneIdx = 0;
    let activeWallIdx = 0;
    let bgFlip = false;

    // ================= 初始化 =================
    function init() {
        // 生成场景卡片 (左侧)
        SCENES.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card scene-card';
            card.style.backgroundImage = `url(${s.src})`;
            card.innerHTML = `<div class="card-label">${s.title}</div>`;
            card.onclick = () => scrollToItem(els.sceneTrack, i);
            els.sceneTrack.appendChild(card);
        });

        // 生成壁纸卡片 (右侧)
        WALLPAPERS.forEach((url, i) => {
            const card = document.createElement('div');
            card.className = 'card wall-card';
            card.style.backgroundImage = `url(${url})`;
            card.innerHTML = `<div class="card-label">#${i+1}</div>`;
            card.onclick = () => scrollToItem(els.wallTrack, i);
            els.wallTrack.appendChild(card);
        });

        // 加载初始内容
        loadScene(0);
        updateWallpaper(0);

        // 监听滚动以实现“高亮中间”效果
        els.sceneTrack.addEventListener('scroll', () => handleScroll(els.sceneTrack, 'scene'));
        els.wallTrack.addEventListener('scroll', () => handleScroll(els.wallTrack, 'wall'));

        // 3D 视差交互 (保留原有)
        document.addEventListener('mousemove', handleParallax);

        // 初始对齐 (延时确保DOM渲染完毕)
        setTimeout(() => {
            scrollToItem(els.sceneTrack, 0);
            scrollToItem(els.wallTrack, 0);
        }, 100);
    }

    // ================= 核心逻辑：光学聚焦引擎 =================

    // 1. 处理滚动高亮逻辑
    function handleScroll(container, type) {
        const center = container.scrollTop + container.clientHeight / 2;
        const cards = container.children;
        let minDist = Infinity;
        let closestIndex = -1;

        Array.from(cards).forEach((card, index) => {
            const cardCenter = card.offsetTop + card.offsetHeight / 2;
            const dist = Math.abs(center - cardCenter);

            // 计算虚化参数：距离越远，变化越剧烈
            // 300px 是衰减半径
            const scale = Math.max(0.85, 1 - dist / 600);
            const opacity = Math.max(0.3, 1 - dist / 350);
            const blur = Math.min(8, dist / 30);
            const grayscale = Math.min(1, dist / 200);

            if (dist < 60) { // 激活阈值：卡片进入中心 60px 范围
                card.classList.add('active');
                // 强制覆盖内联样式，确保激活状态样式优先
                card.style.transform = `scale(1.1)`;
                card.style.filter = `grayscale(0) brightness(1.1) blur(0)`;
                card.style.opacity = 1;

                if (dist < minDist) {
                    minDist = dist;
                    closestIndex = index;
                }
            } else { // 非中心区域
                card.classList.remove('active');
                card.style.transform = `scale(${scale})`;
                card.style.filter = `grayscale(${grayscale}) brightness(0.6) blur(${blur}px)`;
                card.style.opacity = opacity;
            }
        });

        // 自动加载逻辑 (可选：带一点防抖会更好，这里做简易版)
        if (closestIndex !== -1) {
            if (type === 'scene' && closestIndex !== activeSceneIdx) {
                activeSceneIdx = closestIndex;
                loadScene(activeSceneIdx);
            }
            if (type === 'wall' && closestIndex !== activeWallIdx) {
                activeWallIdx = closestIndex;
                updateWallpaper(activeWallIdx);
            }
        }
    }

    // 2. 点击卡片自动滚动到位
    function scrollToItem(container, index) {
        const card = container.children[index];
        const scrollPos = card.offsetTop - container.clientHeight / 2 + card.clientHeight / 2;
        container.scrollTo({ top: scrollPos, behavior: 'smooth' });
    }

    // 3. 加载场景 (Matrix 算法)
    function loadScene(idx) {
        const s = SCENES[idx];

        // 简单淡入淡出逻辑
        els.base.style.opacity = 0.5;
        const img = new Image();
        img.src = s.src;
        img.onload = () => {
            els.base.src = s.src;
            els.base.style.opacity = 1;

            // 设置屏幕位置
            els.screen.style.width = s.config.w + 'px';
            els.screen.style.height = s.config.h + 'px';
            els.screen.style.borderRadius = s.config.r + 'px';
            document.querySelector('.fx-glare').nextElementSibling.style.borderRadius = s.config.r + 'px';

            // 计算 Matrix
            const imgW = els.base.offsetWidth || 1200; // Fallback
            const imgH = els.base.offsetHeight || 800;

            // 转换锚点
            const points = s.anchors.map(p => ({ x: p.x * imgW, y: p.y * imgH }));
            const m = solveHomography(s.config.w, s.config.h, points);
            els.warp.style.transform = `matrix3d(${m})`;
        }
    }

    // 4. 切换壁纸
    function updateWallpaper(idx) {
        const url = WALLPAPERS[idx];
        els.wp.style.backgroundImage = `url(${url})`;

        // 背景切换 (环境光)
        bgFlip = !bgFlip;
        const active = bgFlip ? els.bg2 : els.bg1;
        const inactive = bgFlip ? els.bg1 : els.bg2;
        active.style.backgroundImage = `url(${url})`;
        active.classList.add('active');
        inactive.classList.remove('active');
    }

    // 5. 3D 视差 (Parallax)
    function handleParallax(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        // 细微的移动
        const rotateX = -y * 3;
        const rotateY = x * 3;
        const translateX = x * 10;

        requestAnimationFrame(() => {
            els.pivot.style.transform = `
                    rotateX(${rotateX}deg)
                    rotateY(${rotateY}deg)
                    translateX(${translateX}px)
                `;
        });
    }

    // 6. Matrix Math
    function solveHomography(w,h,p){const s=[0,0,w,0,w,h,0,h],d=[p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y],A=[],b=[];for(let i=0;i<4;i++){let sx=s[i*2],sy=s[i*2+1],dx=d[i*2],dy=d[i*2+1];A.push([sx,sy,1,0,0,0,-sx*dx,-sy*dx]);b.push(dx);A.push([0,0,0,sx,sy,1,-sx*dy,-sy*dy]);b.push(dy);}let n=8;for(let i=0;i<n;i++){let m=i;for(let j=i+1;j<n;j++)if(Math.abs(A[j][i])>Math.abs(A[m][i]))m=j;[A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];for(let j=i+1;j<n;j++){let c=-A[j][i]/A[i][i];for(let k=i;k<n;k++)A[j][k]+=c*A[i][k];b[j]+=c*b[i];}}let x=[];for(let i=n-1;i>=0;i--){let t=0;for(let j=i+1;j<n;j++)t+=A[i][j]*x[j];x[i]=(b[i]-t)/A[i][i];}return [x[0],x[3],0,x[6],x[1],x[4],0,x[7],0,0,1,0,x[2],x[5],0,1].join(',');}

    init();
</script>
</body>
</html>
