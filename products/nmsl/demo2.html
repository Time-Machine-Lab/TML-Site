<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immersive Gallery Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(30, 30, 30, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --active-border: rgba(255, 255, 255, 0.8);
            --text-main: #FFFFFF;
            --text-sub: rgba(255, 255, 255, 0.5);

            /* 动效曲线 */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.33, 1, 0.68, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center; /* 舞台居中 */
            cursor: default;
        }

        /* =========================================
           1. 动态环境光背景 (Ambient Light)
           ========================================= */
        .ambient-canvas {
            position: absolute; inset: -20%; width: 140%; height: 140%;
            z-index: 0;
            /* 增加噪点纹理，提升质感 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* 双缓冲背景层，用于平滑切换颜色 */
        .ambient-layer {
            position: absolute; inset: 0; background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.2s ease;
            filter: blur(100px) brightness(0.6) saturate(1.2);
        }
        .ambient-layer.active { opacity: 0.5; }

        /* =========================================
           2. 顶部导航 (UI Deco - 保留原样)
           ========================================= */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 100px;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 40px 60px; z-index: 200; /* 层级最高 */
            pointer-events: none; /* 让鼠标穿透 */
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .brand {
            font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            color: rgba(255,255,255,0.9); pointer-events: auto; opacity: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .brand span { opacity: 0.5; font-weight: 300; }

        .actions { pointer-events: auto; display: flex; gap: 16px; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s var(--ease-out-expo);
            color: #fff;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); border-color: #fff; }
        .icon-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* =========================================
           3. 左右侧边栏 (The Galleries) - 核心修改
           ========================================= */
        .sidebar {
            position: absolute; top: 0; bottom: 0;
            width: 280px; /* 侧边栏宽度 */
            z-index: 100;
            display: flex; flex-direction: column; justify-content: center;
            /* 核心：边缘渐变遮罩，让卡片自然消融 */
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            pointer-events: none; /* 容器穿透 */
        }
        .sidebar.left { left: 0; align-items: flex-start; padding-left: 40px; }
        .sidebar.right { right: 0; align-items: flex-end; padding-right: 40px; }

        /* 滚动轨道 */
        .scroll-track {
            height: 100%; width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth; /* 平滑滚动 */
            pointer-events: auto; /* 内容可交互 */

            /* 巨大的内边距，确保第一项和最后一项能滚到正中间 */
            padding: 50vh 0;

            /* 隐藏滚动条 */
            -ms-overflow-style: none; scrollbar-width: none;

            display: flex; flex-direction: column; align-items: center; gap: 40px; /* 卡片间距 */
        }
        .scroll-track::-webkit-scrollbar { display: none; }

        /* 卡片基础样式 */
        .card {
            position: relative;
            flex-shrink: 0;
            background-size: cover; background-position: center;
            border-radius: 12px;
            cursor: pointer;

            /* 默认状态：沉浸在背景中 */
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.5s var(--ease-out-expo); /* 丝滑过渡 */

            /* 默认虚化效果 (由JS动态计算覆盖，这里是兜底) */
            filter: grayscale(1) brightness(0.4) blur(4px);
            opacity: 0.4;
            transform: scale(0.9);
        }

        /* 左侧场景卡片 (宽幅 - Cinematic) */
        .card.scene-card { width: 200px; height: 120px; }

        /* 右侧壁纸卡片 (竖幅 - Mobile) */
        .card.wall-card { width: 110px; height: 200px; }

        /* 激活状态 (高亮) */
        .card.active {
            border-color: rgba(255,255,255,0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            z-index: 10;
            /* filter/transform 由 JS 控制以获得更高精度 */
        }

        /* 悬停微反馈 */
        .card:hover { border-color: rgba(255,255,255,0.5); opacity: 0.8; }

        /* 卡片标签 (Label) */
        .card-label {
            position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,255,255,0.8); white-space: nowrap;
            opacity: 0; transition: 0.3s; letter-spacing: 1px; font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .card.active .card-label { opacity: 1; bottom: -30px; }

        /* =========================================
           4. 核心舞台 (Center Stage - 保持不变)
           ========================================= */
        .stage-wrapper {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            pointer-events: none; /* 穿透给两边 */
        }

        .scene-pivot {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear; /* 实时视差响应 */
        }

        .scene-container {
            position: relative;
            /* 稍微缩小一点，给两边留出空间 */
            max-width: 65vw; max-height: 80vh;

            opacity: 0; transform: scale(0.9) translateY(40px) rotateX(10deg);
            animation: heroEnter 1.2s var(--ease-out-expo) forwards 0.3s;
            box-shadow: 0 60px 140px -30px rgba(0,0,0,0.7); /* 更深邃的投影 */
            border-radius: 4px;
        }

        @keyframes heroEnter { to { opacity: 1; transform: scale(1) translateY(0) rotateX(0); } }

        .base-img {
            display: block; max-width: 100%; max-height: 80vh; height: auto;
            pointer-events: none; border-radius: 2px;
        }

        /* 渲染层 */
        .warp-layer { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; z-index: 20; }
        .screen { background: #000; position: relative; overflow: hidden; backface-visibility: hidden; will-change: transform; }
        .wallpaper {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transform: scale(1.02); /* 微微放大防止边缘 */
            transition: background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 质感光效 (保留) */
        .fx-layer div { position: absolute; inset: 0; pointer-events: none; }
        .fx-reflection {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 45%, rgba(255,255,255,0.02) 100%);
            mix-blend-mode: overlay; z-index: 30; pointer-events: none;
        }
        .fx-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.5; mix-blend-mode: overlay; z-index: 32;
        }

        /* 内部边框 (增强真实感) */
        .fx-inner-border {
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(255,255,255,0.1);
            z-index:40; border-radius:inherit;
        }

        /* =========================================
           5. 底部信息提示 (可选)
           ========================================= */
        .info-hint {
            position: fixed; bottom: 40px; left: 0; right: 0;
            text-align: center; pointer-events: none;
            color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 1px;
            opacity: 0; animation: fadeIn 2s ease forwards 1s;
        }

    </style>
</head>
<body>

<div class="ambient-canvas">
    <div class="ambient-layer active" id="bg1"></div>
    <div class="ambient-layer" id="bg2"></div>
</div>

<header class="header">
    <div class="brand">NMSL <span>/ Gallery</span></div>
    <div class="actions">
        <div class="icon-btn" title="Download" onclick="alert('Download Feature')">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="icon-btn" title="Close" onclick="window.close()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
</header>

<div class="sidebar left">
    <div class="scroll-track" id="sceneTrack">
    </div>
</div>

<div class="stage-wrapper">
    <div class="scene-pivot" id="scenePivot">
        <div class="scene-container" id="sceneBox">
            <img id="baseImg" class="base-img" src="" crossorigin="anonymous">

            <div class="warp-layer" id="warpLayer">
                <div class="screen" id="screen">
                    <div class="wallpaper" id="wallpaper"></div>
                    <div class="fx-layer">
                        <div class="fx-reflection"></div>
                        <div class="fx-grain"></div>
                        <div class="fx-inner-border"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="sidebar right">
    <div class="scroll-track" id="wallTrack">
    </div>
</div>

<div class="info-hint">SCROLL SIDES TO EXPLORE</div>

<script>
    // ==========================================
    // CONFIG DATA (数据源)
    // ==========================================
    const RAW_SCENES = [
        { id: 'desk', title: 'Minimalist Desk', src: 'https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=1600', anchors: [{x:0.366,y:0.225},{x:0.686,y:0.354},{x:0.563,y:0.785},{x:0.212,y:0.623}], config: {w:1179, h:2556, r:120} },
        { id: 'mac', title: 'MacBook Pro', src: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca4?q=80&w=1600', anchors: [{x:0.182,y:0.175},{x:0.818,y:0.175},{x:0.818,y:0.845},{x:0.182,y:0.845}], config: {w:1600, h:1000, r:12} },
        { id: 'ipad', title: 'iPad Pro', src: 'https://images.unsplash.com/photo-1544256718-3bcf237f3974?q=80&w=1600', anchors: [{x:0.12,y:0.15},{x:0.88,y:0.15},{x:0.88,y:0.85},{x:0.12,y:0.85}], config: {w:2048, h:2732, r:35} },
        { id: 'hand', title: 'iPhone Hand', src: 'https://images.unsplash.com/photo-1512054502232-120feb11f720?q=80&w=1600', anchors: [{x:0.365,y:0.22},{x:0.685,y:0.35},{x:0.56,y:0.78},{x:0.21,y:0.62}], config: {w:1179, h:2556, r:120} }
    ];

    const RAW_WALLPAPERS = [
        'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',
        'https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?w=800',
        'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800',
        'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=800',
        'https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800',
        'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800'
    ];

    // 扩充数据以确保滚动流畅 (复制3倍)
    const SCENES = [...RAW_SCENES, ...RAW_SCENES, ...RAW_SCENES];
    const WALLPAPERS = [...RAW_WALLPAPERS, ...RAW_WALLPAPERS, ...RAW_WALLPAPERS, ...RAW_WALLPAPERS];

    // ==========================================
    // STATE & ELEMENTS
    // ==========================================
    const state = {
        sIdx: 0,
        wIdx: 0,
        bgFlip: false
    };

    const els = {
        sceneTrack: document.getElementById('sceneTrack'),
        wallTrack: document.getElementById('wallTrack'),
        base: document.getElementById('baseImg'),
        warp: document.getElementById('warpLayer'),
        screen: document.getElementById('screen'),
        wp: document.getElementById('wallpaper'),
        pivot: document.getElementById('scenePivot'),
        bg1: document.getElementById('bg1'),
        bg2: document.getElementById('bg2')
    };

    // ==========================================
    // INITIALIZATION
    // ==========================================
    window.onload = () => {
        initGalleries();

        // 加载初始项 (取中间的数据，方便上下滚动)
        const initialSceneIdx = Math.floor(SCENES.length / 2);
        const initialWallIdx = Math.floor(WALLPAPERS.length / 2);

        loadScene(initialSceneIdx);
        updateWallpaper(initialWallIdx);

        // 延迟滚动到初始位置，确保布局完成
        setTimeout(() => {
            scrollToItem(els.sceneTrack, initialSceneIdx, 'instant');
            scrollToItem(els.wallTrack, initialWallIdx, 'instant');

            // 绑定滚动监听 (放在这里是为了避免初始滚动的触发)
            els.sceneTrack.addEventListener('scroll', () => handleFocusEngine(els.sceneTrack, 'scene'));
            els.wallTrack.addEventListener('scroll', () => handleFocusEngine(els.wallTrack, 'wall'));

            // 初始执行一次对焦
            handleFocusEngine(els.sceneTrack, 'scene');
            handleFocusEngine(els.wallTrack, 'wall');
        }, 100);

        // 启动 3D 视差
        document.addEventListener('mousemove', handleParallax);
    };

    function initGalleries() {
        // 生成左侧场景卡片
        SCENES.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card scene-card';
            card.style.backgroundImage = `url(${s.src})`;
            card.innerHTML = `<div class="card-label">${s.title}</div>`;
            card.onclick = () => scrollToItem(els.sceneTrack, i, 'smooth');
            els.sceneTrack.appendChild(card);
        });

        // 生成右侧壁纸卡片
        WALLPAPERS.forEach((url, i) => {
            const card = document.createElement('div');
            card.className = 'card wall-card';
            card.style.backgroundImage = `url(${url})`;
            card.onclick = () => scrollToItem(els.wallTrack, i, 'smooth');
            els.wallTrack.appendChild(card);
        });
    }

    // ==========================================
    // FOCUS ENGINE (核心光学对焦逻辑)
    // ==========================================
    function handleFocusEngine(container, type) {
        const center = container.scrollTop + container.clientHeight / 2;
        const cards = container.children;
        let minDist = Infinity;
        let closestIndex = -1;

        // 遍历所有卡片计算状态
        Array.from(cards).forEach((card, index) => {
            const cardCenter = card.offsetTop + card.offsetHeight / 2;
            const dist = Math.abs(center - cardCenter);

            // 核心算法：根据距离计算视觉参数
            // 距离越近 -> Scale 越大, Blur 越小, Brightness 越高, Grayscale 越低

            // 1. 激活阈值：距离中心 80px 以内
            const isActive = dist < 80;

            // 2. 计算过渡值
            // scale: 中心 1.15 -> 边缘 0.85
            const scale = Math.max(0.85, 1.15 - (dist / 500));

            // opacity: 中心 1 -> 边缘 0.3
            const opacity = Math.max(0.3, 1 - (dist / 400));

            // blur: 中心 0 -> 边缘 5px
            const blur = Math.min(5, dist / 40);

            // grayscale: 中心 0 -> 边缘 100%
            const grayscale = Math.min(1, dist / 200);

            // brightness: 中心 1.1 -> 边缘 0.5
            const brightness = Math.max(0.5, 1.1 - (dist / 300));

            // 应用样式 (使用 transform 硬件加速)
            card.style.transform = `scale(${scale})`;
            card.style.opacity = opacity;
            card.style.filter = `grayscale(${grayscale}) brightness(${brightness}) blur(${blur}px)`;

            // 标记激活类 (用于边框和阴影)
            if (isActive) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }

            // 记录最近的卡片
            if (dist < minDist) {
                minDist = dist;
                closestIndex = index;
            }
        });

        // 触发更新 (带简单的节流逻辑，防止每一帧都重绘 Canvas)
        if (closestIndex !== -1) {
            if (type === 'scene' && closestIndex !== state.sIdx) {
                state.sIdx = closestIndex;
                loadScene(state.sIdx);
            }
            if (type === 'wall' && closestIndex !== state.wIdx) {
                state.wIdx = closestIndex;
                updateWallpaper(state.wIdx);
            }
        }
    }

    // 辅助：滚动到指定项
    function scrollToItem(container, index, behavior = 'smooth') {
        const card = container.children[index];
        if (!card) return;
        const scrollPos = card.offsetTop - container.clientHeight / 2 + card.clientHeight / 2;
        container.scrollTo({ top: scrollPos, behavior: behavior });
    }

    // ==========================================
    // SCENE & RENDER LOGIC
    // ==========================================

    // 加载场景 (Matrix 映射)
    function loadScene(idx) {
        const s = SCENES[idx];
        // 简单的淡入淡出过渡
        els.base.style.opacity = 0.5;

        const img = new Image();
        img.src = s.src;
        img.onload = () => {
            els.base.src = s.src;
            els.base.style.opacity = 1;

            // 设置屏幕参数
            els.screen.style.width = s.config.w + 'px';
            els.screen.style.height = s.config.h + 'px';
            els.screen.style.borderRadius = s.config.r + 'px';

            // 计算 Matrix
            const imgW = els.base.offsetWidth || 1200;
            const imgH = els.base.offsetHeight || 800;
            const points = s.anchors.map(p => ({ x: p.x * imgW, y: p.y * imgH }));
            const m = solveHomography(s.config.w, s.config.h, points);

            els.warp.style.transform = `matrix3d(${m})`;
        };
    }

    // 更新壁纸 & 环境光
    function updateWallpaper(idx) {
        const url = WALLPAPERS[idx];
        els.wp.style.backgroundImage = `url(${url})`;

        // 背景双缓冲切换
        state.bgFlip = !state.bgFlip;
        const active = state.bgFlip ? els.bg2 : els.bg1;
        const inactive = state.bgFlip ? els.bg1 : els.bg2;

        active.style.backgroundImage = `url(${url})`;
        active.classList.add('active');
        inactive.classList.remove('active');
    }

    // 3D 视差交互 (Mouse Parallax)
    function handleParallax(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 2; // -1 to 1
        const y = (e.clientY / window.innerHeight - 0.5) * 2;

        // 缓动参数
        const rotateX = -y * 3; // Max 3deg
        const rotateY = x * 3;
        const translateX = x * 10;
        const translateY = y * 5;

        requestAnimationFrame(() => {
            els.pivot.style.transform = `
                    rotateX(${rotateX}deg)
                    rotateY(${rotateY}deg)
                    translateX(${translateX}px)
                    translateY(${translateY}px)
                `;
        });
    }

    // Matrix Solver (核心算法)
    function solveHomography(w,h,p){const s=[0,0,w,0,w,h,0,h],d=[p[0].x,p[0].y,p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y],A=[],b=[];for(let i=0;i<4;i++){let sx=s[i*2],sy=s[i*2+1],dx=d[i*2],dy=d[i*2+1];A.push([sx,sy,1,0,0,0,-sx*dx,-sy*dx]);b.push(dx);A.push([0,0,0,sx,sy,1,-sx*dy,-sy*dy]);b.push(dy);}let n=8;for(let i=0;i<n;i++){let m=i;for(let j=i+1;j<n;j++)if(Math.abs(A[j][i])>Math.abs(A[m][i]))m=j;[A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];for(let j=i+1;j<n;j++){let c=-A[j][i]/A[i][i];for(let k=i;k<n;k++)A[j][k]+=c*A[i][k];b[j]+=c*b[i];}}let x=[];for(let i=n-1;i>=0;i--){let t=0;for(let j=i+1;j<n;j++)t+=A[i][j]*x[j];x[i]=(b[i]-t)/A[i][i];}return [x[0],x[3],0,x[6],x[1],x[4],0,x[7],0,0,1,0,x[2],x[5],0,1].join(',');}
