<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线工具箱 - 图片压缩、图片裁剪、透明图制作</title>
    <meta name="description" content="免费在线工具箱，聚合图片压缩、图片裁剪、透明图制作、抠图换透明背景等实用工具，打开即用，无需安装，适合网页图片优化、照片处理和日常文件处理。">
    <meta name="keywords" content="在线工具箱,免费工具箱,图片压缩,图片裁剪,透明图制作,在线抠图,PNG透明背景,网页图片优化,照片处理工具,浏览器工具">
    <script>
      window.ToolHubNav = { currentSlug: 'home' };
    </script>
    <script src="/shared/analytics/analytics.js" defer></script>
    <script src="/shared/navbar/navbar.js" defer></script>
    <style>
      :root {
        --hub-primary: #4f46e5;
        --hub-primary-strong: #4338ca;
        --hub-secondary: #06b6d4;
        --hub-tertiary: #f97316;
        --hub-bg: #fafafa;
        --hub-surface: #ffffff;
        --hub-border: #e4e4e7;
        --hub-border-hover: #d4d4d8;
        --hub-text: #18181b;
        --hub-muted: #52525b;
        --hub-shadow-md: 0 4px 6px -1px rgba(24,24,27,.07), 0 2px 4px -2px rgba(24,24,27,.05);
        --hub-shadow-lg: 0 10px 15px -3px rgba(24,24,27,.08), 0 4px 6px -4px rgba(24,24,27,.04);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        color: var(--hub-text);
        background:
          radial-gradient(circle at top left, rgba(6,182,212,.10) 0%, transparent 28%),
          radial-gradient(circle at top right, rgba(249,115,22,.10) 0%, transparent 32%),
          var(--hub-bg);
        min-height: 100vh;
      }

      .hub-main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 80px;
      }

      .hub-hero {
        padding: 40px;
        border: 1px solid var(--hub-border);
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(79,70,229,.08), rgba(255,255,255,.97) 44%, rgba(6,182,212,.08));
        box-shadow: var(--hub-shadow-lg);
        margin-bottom: 40px;
      }

      .hub-hero__title {
        margin: 0 0 12px;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        font-size: clamp(32px, 5vw, 48px);
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: .015em;
      }

      .hub-hero__sub {
        margin: 0;
        font-size: 17px;
        line-height: 1.6;
        color: var(--hub-muted);
        max-width: 640px;
      }

      .hub-category { margin-bottom: 40px; }

      .hub-category__header { margin-bottom: 16px; }

      .hub-category__title {
        margin: 0 0 4px;
        font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
        font-size: 22px;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: .01em;
      }

      .hub-category__desc {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--hub-muted);
      }

      .hub-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }

      .hub-card {
        display: block;
        padding: 20px;
        border: 1px solid var(--hub-border);
        border-radius: 12px;
        background: var(--hub-surface);
        box-shadow: var(--hub-shadow-md);
        text-decoration: none;
        color: inherit;
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      }

      .hub-card:hover {
        border-color: var(--hub-border-hover);
        box-shadow: var(--hub-shadow-lg);
        transform: translateY(-2px);
      }

      .hub-card:focus-visible {
        outline: 3px solid rgba(79,70,229,.20);
        outline-offset: 2px;
      }

      .hub-card__top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .hub-card__label {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.4;
      }

      .hub-card__badge {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        border-radius: 9999px;
        background: var(--hub-primary);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
      }

      .hub-card__desc {
        margin: 0;
        font-size: 13px;
        line-height: 1.5;
        color: var(--hub-muted);
      }

      .hub-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 64px 24px;
        border: 1px dashed var(--hub-border);
        border-radius: 16px;
        color: var(--hub-muted);
        text-align: center;
      }

      .hub-state__icon { font-size: 32px; line-height: 1; }

      .hub-state__title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--hub-text);
      }

      .hub-state__desc { margin: 0; font-size: 14px; }

      @media (max-width: 640px) {
        .hub-main { width: calc(100% - 24px); padding-top: 24px; }
        .hub-hero { padding: 24px; margin-bottom: 24px; }
        .hub-cards { grid-template-columns: 1fr; }
        .hub-category { margin-bottom: 28px; }
      }
    </style>
  </head>
  <body>
    <div data-shared-navbar></div>

    <main class="hub-main">
      <section class="hub-hero">
        <h1 class="hub-hero__title">在线工具，一站直达。</h1>
        <p class="hub-hero__sub">精选实用工具，按分类整理，打开即用。</p>
      </section>

      <div id="categories-root">
        <div class="hub-state">
          <span class="hub-state__icon">⏳</span>
          <p class="hub-state__title">加载中…</p>
        </div>
      </div>
    </main>

    <script>
      (function () {
        var root = document.getElementById('categories-root');

        function renderEmpty() {
          root.innerHTML = '<div class="hub-state">'
            + '<span class="hub-state__icon">📭</span>'
            + '<p class="hub-state__title">暂无工具分类</p>'
            + '</div>';
        }

        function renderError() {
          root.innerHTML = '<div class="hub-state">'
            + '<span class="hub-state__icon">⚠️</span>'
            + '<p class="hub-state__title">加载失败</p>'
            + '<p class="hub-state__desc">无法读取工具配置，请稍后刷新重试。</p>'
            + '</div>';
        }

        function buildCard(item) {
          var badge = item.badge ? '<span class="hub-card__badge">' + item.badge + '</span>' : '';
          var desc = item.description ? '<p class="hub-card__desc">' + item.description + '</p>' : '';
          return '<a class="hub-card" href="' + item.path + '">'
            + '<div class="hub-card__top"><p class="hub-card__label">' + item.label + '</p>' + badge + '</div>'
            + desc + '</a>';
        }

        function buildCategory(cat) {
          var desc = cat.description ? '<p class="hub-category__desc">' + cat.description + '</p>' : '';
          var cards = (Array.isArray(cat.items) ? cat.items : []).map(buildCard).join('');
          return '<section class="hub-category">'
            + '<div class="hub-category__header"><h2 class="hub-category__title">' + cat.label + '</h2>' + desc + '</div>'
            + '<div class="hub-cards">' + cards + '</div>'
            + '</section>';
        }

        function render(categories) {
          if (!Array.isArray(categories) || !categories.length) { renderEmpty(); return; }
          root.innerHTML = categories.map(buildCategory).join('');
        }

        if (!window.fetch) { renderError(); return; }

        window.fetch('/shared/navbar/tools.json', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('fetch failed');
            return res.json();
          })
          .then(function (data) { render(data.categories); })
          .catch(renderError);
      })();
    </script>
  </body>
</html>
