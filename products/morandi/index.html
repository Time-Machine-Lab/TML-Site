<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨染 - 莫兰迪风格壁纸</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">墨<span>染</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link active">首页</a></li>
        <li><a href="category.html" class="nav-link">画廊</a></li>
        <li><a href="membership.html" class="nav-link">会员</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn-icon" title="收藏">♡</button>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-title">静谧时光</h1>
      <p class="hero-subtitle">低饱和的色彩，高级的质感</p>
    </div>
  </section>

  <!-- 分类入口 -->
  <section class="container">
    <div class="category-grid">
      <a href="category.html?style=pink" class="category-card">
        <div class="category-icon pink">◐</div>
        <span class="category-name">灰粉</span>
      </a>
      <a href="category.html?style=blue" class="category-card">
        <div class="category-icon blue">◑</div>
        <span class="category-name">灰蓝</span>
      </a>
      <a href="category.html?style=green" class="category-card">
        <div class="category-icon green">◒</div>
        <span class="category-name">灰绿</span>
      </a>
      <a href="category.html?style=beige" class="category-card">
        <div class="category-icon beige">◓</div>
        <span class="category-name">米灰</span>
      </a>
    </div>
  </section>

  <!-- 精选壁纸 -->
  <section class="container" style="margin-top: var(--space-3xl);">
    <h2 style="text-align: center; font-weight: 400; margin-bottom: var(--space-xl);">精选作品</h2>
    <div class="grid-4" id="featured-wallpapers"></div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h4>关于墨染</h4>
          <p>专注莫兰迪色系壁纸<br>为您的屏幕增添一份宁静</p>
        </div>
        <div class="footer-section">
          <h4>联系我们</h4>
          <p>hello@moran.art</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2024 墨染壁纸 · 静享时光</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
