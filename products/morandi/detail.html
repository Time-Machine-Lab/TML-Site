<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>壁纸详情 - 墨染</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">墨<span>染</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首页</a></li>
        <li><a href="category.html" class="nav-link">画廊</a></li>
        <li><a href="membership.html" class="nav-link">会员</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn-icon" title="收藏">♡</button>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- 详情内容 -->
  <main class="detail-page">
    <div class="container">
      <div class="detail-grid">
        <div class="detail-preview">
          <img id="wallpaper-image" src="" alt="壁纸预览">
        </div>
        <div class="detail-info">
          <h1 class="detail-title" id="wallpaper-name">壁纸名称</h1>
          <div class="card-tags" id="wallpaper-tags"></div>
          <div class="detail-actions">
            <button class="btn btn-primary">下载壁纸</button>
            <button class="btn btn-secondary">收藏</button>
          </div>

          <!-- 设备预览 -->
          <h3 style="margin-top: var(--space-2xl); font-weight: 400;">设备预览</h3>
          <div class="device-preview-grid">
            <div class="device phone">
              <img id="preview-phone" src="" alt="手机预览">
            </div>
            <div class="device tablet">
              <img id="preview-tablet" src="" alt="平板预览">
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/preview.js"></script>
</body>
</html>
