<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员 - 墨染</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo">墨<span>染</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首页</a></li>
        <li><a href="category.html" class="nav-link">画廊</a></li>
        <li><a href="membership.html" class="nav-link active">会员</a></li>

      <div class="nav-actions">
        <button class="btn-icon" title="收藏">♡</button>
        <button class="btn btn-primary">登录</button>
      </div>
    </div>
  </nav>

  <!-- 页面标题 -->
  <section class="hero" style="padding-bottom: var(--space-lg);">
    <div class="container">
      <h1 class="hero-title">会员计划</h1>
      <p class="hero-subtitle">解锁更多精美壁纸</p>
    </div>
  </section>

  <!-- 会员套餐 -->
  <section class="container">
    <div class="membership-grid">
      <!-- 免费 -->
      <div class="membership-card">
        <div class="membership-icon">◯</div>
        <h3>免费</h3>
        <div class="membership-price">¥0</div>
        <ul class="membership-features">
          <li>浏览全部壁纸</li>
          <li>下载免费壁纸</li>
          <li>基础分辨率</li>
        </ul>
        <button class="btn btn-secondary">当前方案</button>
      </div>

      <!-- 月度 -->
      <div class="membership-card featured">
        <div class="membership-icon">◈</div>
        <h3>月度会员</h3>
        <div class="membership-price">¥19<span>/月</span></div>
        <ul class="membership-features">
          <li>无限下载</li>
          <li>4K 高清分辨率</li>
          <li>抢先体验新作</li>
        </ul>
        <button class="btn btn-primary">立即订阅</button>
      </div>

      <!-- 年度 -->
      <div class="membership-card">
        <div class="membership-icon">✧</div>
        <h3>年度会员</h3>
        <div class="membership-price">¥168<span>/年</span></div>
        <ul class="membership-features">
          <li>全部月度权益</li>
          <li>专属收藏系列</li>
          <li>优先客服支持</li>
        </ul>
        <button class="btn btn-primary">立即订阅</button>
      </div>
    </div>
  </section>

</body>
