# Nginx 动态子域名路由配置
# 自动根据子域名路由到对应产品目录

server {
    listen 80;
    server_name ~^(?<product>[^.]+)\.tmlab\.site$;

    root /var/www/static-sites/$product;
    index index.html;

    # 产品目录不存在时返回 404
    if (!-d /var/www/static-sites/$product) {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件短缓存
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# 主域名重定向
server {
    listen 80;
    server_name tmlab.site www.tmlab.site;
    return 301 https://docs.tmlab.site;
}
