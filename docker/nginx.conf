# Nginx 动态子域名路由配置
# 自动根据子域名路由到对应产品目录

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name ~^(?<product>[^.]+)\.tmlab\.site$;
    return 301 https://$host$request_uri;
}

# HTTPS 子域名配置
server {
    listen 443 ssl http2;
    server_name ~^(?<product>[^.]+)\.tmlab\.site$;

    # SSL 证书配置（AllinSSL 部署的泛域名证书）
    ssl_certificate /etc/ssl/certs/tmlab.site/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/tmlab.site/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/static-sites/$product;

    # 产品目录不存在时返回 404
    if (!-d /var/www/static-sites/$product) {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
        index index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件短缓存
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
}

# 主域名重定向（HTTP）
server {
    listen 80;
    server_name tmlab.site www.tmlab.site;
    return 301 https://docs.tmlab.site$request_uri;
}

# 主域名重定向（HTTPS）
server {
    listen 443 ssl http2;
    server_name tmlab.site www.tmlab.site;

    ssl_certificate /etc/ssl/certs/tmlab.site/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/tmlab.site/privkey.pem;

    return 301 https://docs.tmlab.site$request_uri;
}

# 健康检查端点
server {
    listen 80;
    server_name localhost;

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
